h1:Ch 1 & 17 - The Holy Bible & The Canon of the Bible
================================================================
h4:The Old Testament
ip: ~u~39 books (Genesis to Malachi)~u~
ip: Creation, fall of man, hope of redemption
ip: God intervened regularly in the lives of Israelites
ip: End with the hope of a Saviour, the Messiah (Christ), who would come to save His people
ip: Spans from BC 2000 to BC 450

h4:The New Testament
ip: ~m~27 books (St. Matthew to Revelations) ~m~
ip: Gospels - Birth of Christ to his resurrection
ip: Acts of Apostles - Establishment of the church
ip: Romans till Jude - Letters / Epistles
ip: Revelations - Apocalyptic Literature
ip: Spans from BC 5 till about AD 100

h2:Pentateuch / Torah
Pentateuch (Greek meaning ~u~’Five scrolls’~u~) or / Torah (Hebrew meaning ~u~’Law’~u~) are the ~u~first five books~u~ of the Bible. ~m~Authorship ascribed to Moses~m~. Moses was the head of prophets and liberator of Israelites from Egypt.

~b~Genesis~b~ - God called Abraham - asked him to go away from his homeland. God appeared to Abraham and instructed him. God spoke to his successors - Isaac, Jacob, Joseph. Creation till the life of Israelites in Egypt.

~b~Exodus~b~ - Tribulations in Egypt. God called Moses. Liberation from Egypt. God’s covenant on Mount Sinai (Ten Commandments)

~m~~b~Leviticus~b~ - Sacrifices & offerings made to God~m~

~b~Numbers~b~ - Enumeration of the people

~b~Deuteronomy~b~ - Farewell speeches of Moses, reiteration of the covenant with God and the laws to be obeyed

h2:Historical Books
~b~Joshua~b~ - After Moses, Joshua led Israel into the promised land, where they settled down as a nation. After that Joshua judged Israel

~b~Judges~b~ - The history of Israel during the period of Judges after Joshua, from Othniel. Notable judges - Gideon, Samson

~b~Ruth~b~

~b~1 & 2 Samuel~b~ - Eli as judge. Succeeded by Samuel, the last judge. Israel rejection of Theocracy (God as King). First King - Saul. David becomes King,

~b~1 & 2 Kings~b~ - King Solomon builds the temple. Solomon sins. ~m~God divides Israel into Israel (Northern Kingdom) and Judah (Southern Kingdom).~m~ Israel was captured by Assyrians. Judah goes into exile into Babylon (King Nebuchadnezzar).

~b~1 & 2 Chronicles~b~ - ~m~Repetition of the events in Samuel / Kings along with a number of Genealogies.~m~

~b~Ezra and Nehemiah~b~ - Return from Babylonian exile. Thus the books till Nehemiah deal with the history of Israel till 450 BC.

~b~Esther ~b~

h2:Wisdom Books
~b~Job~b~

~b~Psalms ~b~ - It’s a collection of Hebrew Jewish Hymns. Mostly attributed to King David. There are also other authors. There are 150 psalms. The numbering in the Bible and our prayer books may be slightly different

~b~Proverbs ~b~ - Written by King Solomon. Teaches “The fear of God (meaning submission to the will of God) is the beginning of wisdom”.

~b~Ecclesiastes ~b~ - Written by King Solomon.

~b~Song of Songs ~b~ - Written by King Solomon.

~b~Prophets ~b~ - Prophets from Isaiah till Malachi gave instructions to people to return to the path of righteousness whenever they went astray. The prophets laboured to bring them back to a moral life based on the covenant.

h2:The Canon of the Bible
~m~Canon (greek) - literally ‘~u~measuring rod~u~’ - technically means ‘~u~Rules or criteria~u~’~m~

~m~The canon of the Bible refers to the ~u~principles by which the books are included~u~ in it~m~

~m~The canon of the Bible was evolved and established through a long period of time.~m~

~m~Several books were progressively added to the Holy Bible before the Bible we have today was finally established and confirmed~m~

h3:Criteria employed to include a book in the Canon
~u~The author should be an accepted ‘man / woman of God’~u~

~u~The content should be beneficial to the faith and order of one’s life. It should be in harmony with similar books~u~

~u~It should have been used in worship and should have general acceptance~u~

~u~It should generate thoughts of God in the believers, and lead them to God~u~

h2:The Old Testament Canon
The word ‘canon’ was not used during the Old Testament period. There were ~u~two canons of the bible followed by the Jewish community~u~

h3:The Hebrew Bible
~m~The Hebrew Bible had 39 books. These were integrated into 20 books. It’s called Ta Na K ~m~

~u~Torah (The Law)~u~ - Genesis, Exodus, Leviticus, Numbers, Deuteronomy

~m~Nebim (The Prophets)~m~ - Joshua, Judges, Samuel, Kings, Isaiah, Jeremiah, Ezekiel, The Twelve (Minor Prophets)

~u~Kethubim (The Scriptures / The Writings)~u~ - Psalms, Proverbs, Job, Song of Songs, Ruth, Lamentations, Ecclesiastes, Esther, Daniel, Ezra, Nehemiah, Chronicles

h3:~m~Septuagint (LXX)~m~
Referred to as “~u~The Greek Old Testament~u~” or “~u~The Translation of the Seventy~u~”

“The laws of the Jews“ were translated into the Greek language at the request of Ptolemy II Philadelphus (285–247 BC) by seventy scholars.

The first five books of the Hebrew Bible were translated from Biblical Hebrew into Koine Greek by Jews living in the Ptolemaic Kingdom, probably in the third century BC.

The remaining books were translated by the 2nd century AD.

Before the 3rd century BC, a large number of Jews migrated to Alexandria. The later generations didn’t know Hebrew. And they followed Septuagint.

h3:Deutero - Canonical books
~u~The LXX had 7 more books (39 + 7 = 46).~u~

~u~Deutero - canonical - A secondary canon~u~

Protestants refer it as Apocrypha (meaning ‘hidden’ - outside accepted canon)

Tobit, Judith, 1 & 2 Maccabees, Wisdom of Solomon etc.

h3:~m~Council at Jamnia~m~
The rabbis & scholars of Judaism wanted ~u~to prevent the spread of Christianity~u~

Assembled at Jamnia (AD 90)

~u~Rejected the Alexandrian Canon of the Bible used by the Christian church~u~

The number of books of the Bible was fixed at 39

~m~The Orthodox and Catholic churches accept all 46 books ~m~

Jews and Protestants accept only 39 books

h3:Peshitho
Peshitho is the ~u~Syriac Bible~u~

~u~Malankara Orthodox Church recommends the use of “Peshitho”~u~

~m~Malayalam translations of Peshitho are available. The first translation done in 1811 (Ramban Philipose, Ramban Ittoop Pulikkottil and linguist Thinmaya Pillai) ~m~

The peshitho also contains some of the Deuterocanonical books found in LXX

h2:New Testament Canon
The canon of the New Testament was also established through progressive recognition.

All 27 books in the New Testament were written in the 1st century AD.

By 2nd century AD, several other books came into currency - authored by heretics to propagate their theories. This caused confusion among believers

So, the establishment of a New Testament canon became a necessity.

Christians thought that, like Jews, they too needed authoritative texts and a canon to follow

h3:New Testament books
Based on the criteria, the first books to be recognised were

The four gospels

Acts of Apostles

Thirteen epistles attributed to St. Paul

Nine books - subsequently & progressively admitted - Hebrews, James, Jude, Revelations, 1 & 2 Peter, 1, 2 & 3 John

~m~The first person to prepare a list of the New Testament books was a heretic named Maricon.~m~

The early church fathers have listed the New Testament books in their writings. Example. St. Athanasius, bishop of Alexandria, Pastoral letter - AD 365 listed all 27 books. ~m~However, in the list of St. Cyril of Jerusalem, the Book of Revelations is excluded.~m~

h3:~m~Classification of the New Testament books~m~
The four gospels - The gospel is the good news that Jesus Christ, the Son of God, died for our sins and rose again, eternally triumphant over his enemies, so that there is now no condemnation for those who believe, but only everlasting joy. The gospels contain events from the birth of Jesus till his Ascension.

Historical book - Acts of Apostles - Events that succeeded the ascension of Jesus Christ. The Holy Spirit comes on the day of Pentecost. Founding & development of the church in Judah and Jerusalem and other parts of the world

Epistles - Romans to Jude

Apocalyptic Literature - Revelation

h3:The Holy Church & The Holy Bible
The Great General councils did not take any decisions regarding the canon of the Holy Bible.

The canon of the Bible is defined in certain local councils

~u~It is the Holy Church that has given us the Holy Bible.~u~

The church has weighed the authority of a particular book and has declared it to be part of the canon.

~u~At the same time, the role of the Holy Bible in regulating the faith of the church and the life of the believers is unique and primary.~u~

~u~The church existed before the bible came into existence.~u~

h1:Ch 2 - Inter Testament History
============================================
h2:Medo-Persian Empire ~ 550 - 332 BC

~b~Cyrus the Great ~ 550-530 BC~b~

ip:~m~538 BC - King Cyrus issues a decree permitting Jews to return to Jerusalem~m~

ip:~m~Ezra, Nehemiah, Joshua, the priest, Zerubbabel - leadership to restoration~m~: This is the Second Temple of Jerusalem

ip:Restoration of Jerusalem Temple - Books of Haggai, Zechariah, Ezra, Nehemiah

~m~~b~Darius the Great ~ 521-486 BC~b~

ip: ~m~ Second Temple completed in 515 BC - Ezra 6:15

~b~Return from exile~b~

&emsp; During Parsi Kings (538-332 BC), Jews in Babylonian exile returned to Jerusalem

&emsp; Ref: Book of Maccabees, Josephus, Philo of Alexandria (1st Century AD)

h2:The Greek Period ~ 333 - 63 BC
BC 333 - Alexander of Macedonia defeated the Parsis and founded a vast empire

BC 323 - Alexander dies in Babylon. Kingdom divided among his four generals, of whom we will study about
&emsp; - Ptolemy in Egypt
&emsp; - Seleucus in Middle East & Central Asia

h2:Maccabees
~b~1 Maccabees 1:1-3,5,6,8 (The death of Alexander):~b~ 1 After Alexander son of Philip, the Macedonian, who came from the land of Kittim, had defeated King Darius of the Persians and the Medes, he succeeded him as king. (He had previously become king of Greece.) 2 He fought many battles, conquered strongholds, and slaughtered the kings of the earth. 3 He advanced to the ends of the earth and plundered many nations. When the earth became quiet before him, he was exalted, and his heart was lifted up. 5 After this he fell sick and perceived that he was dying. 6 So he summoned his most honored officers, who had been brought up with him from youth, and divided his kingdom among them while he was still alive. 8 Then his officers began to rule, each in his own place

Incessant wars between the Ptolemaic & the Seleucid empires, the two largest empires issued from Alexander the Great’s conquest of the Persian Empire. Judah & Egypt were under the Ptolemies from 305 BC - 198 BC

Ptolemy II Philadelphus (Son of Ptolemy I - 284 to 246 BC) - promoted the Library of Alexandria - 72 Jewish scholars translated Hebrew Bible into Greek - Septuagint (LXX)

198 BC - The Battle between Seleucid forces led by Antiochus III and Ptolemaic forces. The Seleucids win the battle which allows Antiochus III to obtain entire possession of Palestine region from King Ptolemy V of Egypt. But he did not occupy Egypt.

King Antiochus III the Great (ruled 223 - 187 BC) allowed Jews to live according to their own scriptures. Josephus writes that he also gave financial aid towards this

King Antiochus IV ascended to throne in 175 BC. King Antiochus IV (ruled 175-164 BC) religiously persecuted the Jews. Onias III was the high priest of Israel - a pious man (from 198/197 BC to 175 BC). Jason, the brother of Onias bribed the King and became the High Priest of Jerusalem (2 Maccabees 4:7-10). King also wanted to capture the wealth of the Temple of Jerusalem as he was massive need of money. Jason tried to spread Greek culture in Jerusalem. He built a gymnasium right next to the Temple. Encouraged the priests to neglect the sacrifices in favor of discus throwing and Greek wrestling.

In 172 BC, Menelaus bribed Antiochus and became the high priest. Menelaus wasn’t even from the high-priestly family. He was a cruel tyrant (2 Maccabees 4:24-25). When he couldn’t raise the massive money he promised the King, he started stealing gold vessels from the Temple to sell them. And also for his personal needs. Onias III publicly rebuked him for this sacrilege. So, he plotted and had Onias III killed (171 BC).

~b~1 Maccabees 1:10, 16-19 (Antiochus IV defeats Ptolemy VI - BC 170):~b~ 10 From them came forth a sinful root, Antiochus Epiphanes, son of King Antiochus; he had been a hostage in Rome. He began to reign in the one hundred thirty-seventh year (175 BC) of the kingdom of the Greeks.16 When Antiochus saw that his kingdom was established, he determined to become king of the land of Egypt, in order that he might reign over both kingdoms. 17 So he invaded Egypt with a strong force, with chariots and elephants and cavalry and with a large fleet. 18 He engaged King Ptolemy of Egypt in battle, and Ptolemy turned and fled before him, and many were wounded and fell. 19 They captured the fortified cities in the land of Egypt, and he plundered the land of Egypt.

~b~1 Maccabees 1:20-24 (on Return from Egypt - Antiochus Loots the Temple):~b~ 20 After subduing Egypt, Antiochus turned back in the one hundred forty-third year (169 BC) and went up against Israel and came to Jerusalem with a strong force. 21 He arrogantly entered the sanctuary and took the golden altar, the lampstand for the light, and all its utensils. 22 He took also the table for the bread of the Presence, the cups for drink offerings, the bowls, the golden censers, the curtain, the crowns, and the gold decoration on the front of the temple; he stripped it all off. 23 He took the silver and the gold and the costly vessels; he took also the hidden treasures that he found. 24 Taking them all, he went into his own land.

~b~1 Maccabees 1:29-33 (2 Yrs later - Antiochus destroys the walls of the Temple - Makes it their fortress):~b~ 29 Two years later the king sent to the cities of Judah a chief collector of tribute, and he came to Jerusalem with a large force. 30 Deceitfully he spoke peaceable words to them, and they believed him, but he suddenly fell upon the city, dealt it a severe blow, and destroyed many people of Israel. 31 He plundered the city, burned it with fire, and tore down its houses and its surrounding walls. 32 They took captive the women and children and seized the livestock. 33 Then they fortified the city of David with a large strong wall and strong towers, and it became their citadel.

~b~1 Maccabees 1:54-56 (Sacrilege on the Altar and temple dedicated to Zeus):~b~ 54 Now on the fifteenth day of Chislev, in the one hundred forty-fifth year (167 BC), they erected a desolating sacrilege on the altar of burnt offering. They also built altars in the surrounding towns of Judah 55 and offered incense at the doors of the houses and in the streets. 56 The books of the law that they found they tore to pieces and burned with fire.

h3:~m~Maccabean Revolt & Hanukkah~m~
Jews under Mattathias & his sons revolted against the desecration of the Temple and Jewish religion

The sons of Mattathias (Hasmonean tribes) under the leadership of Judas Maccabeus (“the hammer”) defeated the troops of Antiochus IV in BC 164

They reclaimed the Temple & rededicated it to God

This rededication of the Temple was in later Jewish history celebrated as a Feast called ‘Hanukkah’

h3:Hasmonean Dynasty
Judas Maccabees son of Mattathias (167 - 160 BC)

Jonathan son of Mattathias (160 - 143 BC)

During the reign of Simon, son of Mattathias (142-134 BC), the threat of foreign invasion dissipated

The first book of Maccabees ends with death of Simon and the succession of his son John Hyrcanus (reign 134 - 104 BC)

The Hasmonean (Hasidim) dynasty ruled in Israel till BC 63 surviving the threat of various foreign powers like the seleucids and Romans

The Hasmonean rulers were priests, administrators and military generals of Israel at the same time

It was during their period that social groups like Sadducees, Pharisees etc. originated in the Jewish community

John Hyrcanus ⇒ His son Aristobulus I (104 to 103 BC - First Hasmonean King) ⇒ His brother Alexander Jannaeus (103 to 76 BC)

Alexander named Queen Salome Alexandra (76 to 67 BC) as the successor - Second woman ruler of Israel after Athaliah

h2:Roman Rule
Hyrcanus II ruled from 67 to 66 as King. He was overthrown by his brother Aristobulus II - 66 to 63 BC as King

Both sought the help of Roman general Pompey. Pompey favoured weaker Hyrcanus over Aristobulus. Hyrcanus restored as High priest. And Israel comes under Roman rule

Hyrcanus was helped by Antipater the Idumean (Edomites are sons of Esau) as he preferred a weak Hyrcanus. Antipater (father of Herod the Great) controlled everything.

Antigonus II Mattathias (40-37 BC) conquered Jerusalem with the help of Parthians and became King. He was the last Hasmonean King

Herod fled to Rome, where on the recommendation of Mark Antony, Roman Senate proclaimed him king (40 BC).

37 BC, Herod conquers Jerusalem & wiped out Hasmonean family including Hyrcanus II.

Herod ruled till his death in 4 BC (Jesus born).

Greatest contribution - Reconstruction of Jerusalem Temple. Started in BC 20 and took 46 years to complete. It’s sometimes referred to as Herod’s Temple

After Herod, Augustus Caesar appoints his 3 sons and Herod’s sister as Tetrarchs
&emsp; - Herod Archelaus, Tetrarch of Judea, Idumea & Samaria. He was cruel. Deposed in AD 6
&emsp; - Herod Antipas (4 BC - 39 AD) - Tetrarch of Galilee and Perea
&emsp; - Philip The Tetrarch (4 BC - 34 AD)
&emsp; - Salome I (4 BC - 10 AD)


In Judea, after Archelaus was deposed in AD 6,
&emsp; - Seven non-Jewish governors from AD 6 to AD 41
&emsp; - Pontius Pilate - Governor from AD 26 to AD 36

h1:Ch 3 - Worship - Old Testament
============================================
h2:Worship
Worship is due only to God

God is our creator, our protector, the one who sustains us - Isaiah 46:4 - “Even to old age I am he, and even to gray hairs I will carry you. I have made, and I will bear. Yes, I will carry, and will deliver”

- We express our faith and trust in God through worship
- When we are conscious of God’s presence or experience his presence, it’s our natural response to worship him
- Worship is man’s natural response to God that comes from the depth of his heart.

~m~A person’s mind, body & tongue are involved in true worship~m~

Our worship is a continuation & improvement on the Old Testament worship

Various forms of worship evolved without deviating from the fundamental faith.

h2:Jewish worship
Jews had compiled their scriptures in order to use it in their worship
- Song of songs used during the Festival of Passover
- Psalms are sung with the accompaniment of musical instruments during worship

Jews read scriptures in an atmosphere of prayer & worship at the Temple & renew their covenant with God

h2:Worship by Tribal Fathers
- No priests. The tribal fathers used to submit their offerings directly to Yahweh (Read Gen 12:6-8)
- In the story of creation, the 7th day was set apart for worship. However, no place was set apart
- During the time of Tribal fathers, when a person had a God-experience, that place became the place of worship
- The worship centred in God-experience and not on particular place, time or person
- The person himself became the priest & made offerings (Read Gen 26:23-25, Gen 33:18-20)

The details of offerings and worship during this period are not available. Places like Bethel, Gilgal and Peniel are mentioned as places of worship. All these are places where the fathers communicated with God

h2:Tabernacle
Exodus - On Mount Sinai, God gave Moses detailed instructions on how to build the Tabernacle - Length, breadth and height of the Tabernacle, its court, Ark of the covenant, the mercy seat, the altar of burnt offerings, the altar of incense etc.

Leviticus - Instructions about the sacrifices, rituals and offerings. Meat-offerings, sin-offerings, trespass-offerings and peace-offerings on prescribed days and times

Priests were from the house of Aaron (tribe of Levi). Levites were the assistants

When Israel moved from one camp to another, the Levites carried the ark on their shoulders. Levites carried the Tabernacle.

When they encamped at a place, the tabernacle was to be set in the middle of the camp

~m~The word Shekinah indicates God camping amidst the people - manifestation of the presence of God~m~

Israel camped / journeyed - as the cloud moved (Read Exo 40:36-38)

Tabernacle became a place of worship. It’s a portable arrangement set apart for offerings and prayers

The significance of places like Bethel, Gilgal and Peniel where Tribal Fathers could communicate with God slowly dissipated

~m~When Israel settled down at Canaan, the Ark was placed at Shiloh. So, Shiloh became a place of worship.~m~ The place Shiloh has no particular significance. It was the place where the Ark stood was the place of worship as it represented divine presence

This continued during the period of judges until King David

The concept of ‘priesthood only for the tribe of Levi’ changed. Samuel was not a Levite

h2:The Temple of Jerusalem
King David brought the Ark of the Lord from Shiloh to Jerusalem with great revelry

David could not build the Temple. King Solomon build the Temple of Jerusalem and placed the ark of the Lord permanently there

Thereafter the Temple of Jerusalem became the permanent location of divine presence

The worship of God and all offerings had to be made only in Jerusalem

The centralisation of worship caused a shift from sanctity of the hour of worship to the sanctity of the place of worship

The priests were appointed by the King. King David appoint priest Zadok

The kings would be anointed by either high-priest or the prophet (1 Samuel 16: 3, 1 Kings 1: 39). Prophets had God’s calling (Isaiah 6, Amos 7:14)

Jerusalem became the city of God and worship became centralised in the Temple of Jerusalem

h2:Synagogue
After Nebuchadnezzar destroyed Solomon’s Temple, the practice of making offerings to God came to an end. It was impossible to make offerings to God as they were taken away as captives

~m~During the period of captivity, a new form of worship developed - Worship at Synagogue~m~

There were no sacrifices at Synagogue

Instead they prayed to God, recited hymns (Psalms), read scriptures & learned the interpretation of the Scriptures

The role of the priest declined. The synagogue was under the charge of an elder or a precentor (cantor)

If the elder of the synagogue was convinced that someone could preach, he would be invited to preach

There would be a Chaburah meal or fellowship at the dining table

If the priest was present, there would also be a Final Benediction (Aaronic Benediction. Read Num 6:22-27)

These were the features of the new worship

h2:Second Temple Period
Following the proclamation of King Cyrus, Israelites returned from exile & rebuilt the second Temple

Worship at the Temple sacrifices were revived (Ezra and Nehemiah). However, worship at the Synagogue also continued

h2:Jesus
~m~Both Temple worship & Synagogue worship was present during Jesus’ time~m~

Mark 1:39 - “And he went into their synagogues throughout all Galilee, preaching and casting out demons”

Mat 21:12-23 - Jesus entered into the temple of God and drove out all of those who sold and bought in the temple, and overthrew the money changers’ tables and the seats of those who sold the doves. He said to them, “It is written, ’My house shall be called a house of prayer,’ but you have made it a den of robbers!“

h1:Ch 4 - Priesthood - Old Testament
============================================
h2:Priesthood
~m~Purohitan (sanskrit) = one who stands ahead of others / one who is vested with authority ~m~

Vaidikan (sanskrit) = one who knows scriptures / one who has learned the scriptures properly

In Hebrew, the word ‘Kohen’ is used in the sense of ‘priest’

Hebrew word ‘Kohen’ (used 740 times in the old testament) = bow before God / Worship or submit to God

Syriac work ‘Kahen’ (‘Kohne’ is derived from this root word) = one who brings prosperity / joy

LXX translates Kohen as ‘Hiyareh Yoos’ (Greek) = Pure / taintless

The church uses the word priest incorporating all these meanings

h2:Old Testament
Genesis 14: 18-20 - ~m~King Melchizedek - First mention of priesthood. There are no references to the origins or history of this priest~m~ (Ref: Heb 7:1-3, Psalms 110:1-4, Heb 7:4-10)

Tribal Fathers made offerings directly to Yahweh

Moses himself sprinkled the blood after the sacrifice. No priest referred here (Ref Exo 24:4-8)

Judges 17 talks about a man in Ephraim named Micah makes an idol and installs one of his sons as his Priest

h2:Levitical Priesthood
Exodus 29:10-25 & Leviticus 8:22-28 talks about consecration offering. Through these Aaron and his sons are set apart as priests unto God. Here Moses himself makes the offering

Consecration or sanctifying is the ritual of submitting the offerings to the Master first and after receiving them back, burning them on the altar

Aaronic Priesthood is inherited (Ref Lev 16:32)

The priest is separated from others and is as separated to the Lord as the holy altar and the clean and unblemished offering sacrificed upon it (Read Exo 28:36-38)

Henceforth the priest stands separated from all uncleanness

Lev 21:1-6 says that the priest should keep away from all that defiles him

He had to be extremely careful while entering the sanctuary of the Lord. He had to be adorned with special vestments (Ref. Ex 28:43), wash his clothes (Ref. Num 8:7), cleanse himself (Ref. Ex 30:17-20, 40:31-32, Lev 8:6-7), and had to keep away from intoxicating drinks (Lev 10:8-11)

All these provide dignity and respectability to the priest

Only men could become priests and they should not be physically deformed (Ref. Lev 21:16-21)

~m~The High Priest was to be adorned with special vestments on all occasions except on the Day of Atonement~m~ (Ref Lev 16, Exo 28:43)

Thus the responsibilities of Old Testament priesthood developed as a result of the changing social circumstances. The office of priesthood ensured salvation & blessing to all people. The priest was a mediator between God & man.
ip:- In seeking God’s answer & in teaching the people, the priest is the representative of God before his people.
ip:- In executing the cultic duties & in seeking refuge in God, the priest is the representative of the people before God.

h2:Priesthood at the time of Kings
At the time of Eli and Samuel, the office of Prophet, priest and judge were vested with a single person

Samuel was not a Levite (he was an Ephraimite). Ref 1 Samuel 1 (verses 1,2)

During the period of kingship, the practice of King appointing the priest came into existence

King David appointed Zadok and Ahimelech (Ref 2 Samuel 8:17) as Priests

King Solomon retained only Zadok as priest (Ref 1 Kings 2:27-35) (Ahimelech’s son Abiathar sided with Adonijah)

Priests anointed Kings. Also Read Num 27:18-21. Zadok the priest and Nathan the prophet anointed King Solomon.

When Israelites went into captivity, the priest was vested with political leadership as well (Ezra, Nehemiah)

The priest became the social leader as king, priest and prophet

Kingship ceased to exist and prophecy waned

The hierarchy of High Priest and other priests developed during the post-exilic period (Read Hag 1:1)

h2:Duties of Priests
Priesthood originated in connection with Mounts of offering. The priests originally were guards of these Mounts of offering. The first priests were ordinary people who took up the duty of protection.

People assembled at the Mounts of offering to see God’s commandments. The priest would inform God’s will to these people. It was Moses alone who had directly interacted with God. Others used media of divine consultation like Ephod (Hosea 3:4), Urim or Thummim to interact with the God (Read Deu 33:8-10)

Another important responsibility of the priests was to teach (Read Deu 33:10, Mal 2:7, Eze 44:23). Prophets have scolded priests for neglecting this duty. They criticised the priests who taught for hire (Ref Micah 3:11). The priests had to keep knowledge, seek the law from the Lord’s mouth and teach the people accordingly. The priest’s teaching should be centred on the scriptures, on wisdom and on law (Ref Haggai 2:11). The ministry of teaching was taken up by the Levites during the exilic period and the priests during the post-exilic period

When the temple was built and worship was centralized, cultic duties associated with sacrifices and offerings was the sole prerogative of the priests. Along with overseeing the sacrifice, the duties of the priests included setting the shewbread on the table, dressing the lamps, blowing the trumpet and blessing in the name of the Lord. These duties made the priest a mediator between God and man

Ref Deu 10:8, Deu 21:5, 1 Chr 23:13

h3:Conclusion
Thus the responsibilities of Old Testament priesthood developed as a result of the changing social circumstances. The office of priesthood ensured salvation and blessing to all people. The priest was a mediator between God and man. In seeking God’s answer and in teaching the people, the priest is the representative of God before his people. In executing the cultic duties and in seeking refuge in God, the priest is the representative of the people before God

h3:Urim and Thummim (Not in the textbook)
The Urim (Hebrew: “lights“) and the Thummim (Hebrew: “perfection“ or “truth“) are elements of the hoshen, the breastplate worn by the High Priest attached to the ephod, a type of apron or garment.

The pair are used frequently in the Old Testament, in Exodus 28:30 through God’s instruction to Aaron on how to adorn his breastplate worn in the holy place; in 1 Samuel 14:41 by King Saul to determine who was at fault for breaking the army’s fast.

Modern scholars have noted the meaning of Lights and Perfection as being epithets for Jesus Christ, both the Light and Truth (perfection).

There is no description of the form of the Urim and Thummim in the passage describing the high priest’s vestments

h1:Ch 5 - Jewish festivals
============================================
h2:Canonical Jewish Feasts
h4:Canonical Feasts~m~
Feasts prescribed in the scriptures (Pentateuch / Torah). All men were to come before God on these three feasts (Read Exo 23:14-17, Exo 34:23-24)
- Passover & Feast of Unleavened Bread
- Pentecost / Feast of Weeks / First Fruits / Shavout
- Feast of Tabernacles - Harvest Festival / Sukkot

h3:1. Passover & Feast of Unleavened Bread
First one in the calendar of feasts of the Jews

Unleavened bread for 7 days

Observed in commemoration of God liberating Israel from Egypt

Begins on 14th of Abib, the 1st month of the Jewish Calendar (Read Exodus 12:1-18)

On the evening of that day, Jews sacrifice the Passover Lamb and observe the Passover

From 15th day onwards, the feast of unleavened bread should be observed for 7 days

There should be a convocation on the 1st & 7th day (Lev 23:6-8)

The unleavened bread was a symbol of affliction & haste (Deu 16:2-3)

Originally the Passover was not a pilgrimage feast

Since King Josiah of Judah convened all his people at Jerusalem and observed the Passover, this became a feast to be observed at Jerusalem annually (Read 2 Kings 23:21-23)

Earlier it had been a feast observed in Jewish home. The animal killed was according to the size of the household and feast had been eaten in haste (Exo 12).

The blood was then put over the door posts and beams of the household. The description that this feast would redeem the first born from death and the Angel of Death would Passover the houses of those who observe it confirms that it had been a household feast (Exo 12:13)

h3:2. ~m~Pentecost ~m~/ Feast of Weeks / First Fruits / Shavout
This is the second festival according to the Jewish Calendar (Exo 23:14-17)

This feast was to be observed seven weeks after the observance of the feast of the Unleavened Bread (Deu 16:9-11)

The word Pentecost means 50. Shavout means ‘weeks’

Also known as the Feast of First Fruits and is observed on a single day

The scriptures command that no one should appear empty handed before the Lord on that day (Deu 16:16-17, Lev 23:17-20)

The Jews should make a special offering of atonement besides the meat-offering and drink-offerings on that day (Num 28:26-31)

Digression 1 (not in text book): The Holy Spirit's outpouring at Pentecost broke down barriers of language and culture, uniting people from different nations and backgrounds into one body in Christ. It's seen as a reconciliation of humanity, healing the divisions caused by the Tower of Babel. Read Lev 23:15-16. Read Acts 2:1-6

Digression 2 (not in text book): In the rabbinic period, and probably earlier, Pentecost came to be celebrated as more than an agricultural festival; it was the anniversary feast of the giving of the Law or the establishment of the covenant at Sinai. Birth of the church at Pentecost under the new covenant.

h3:3. Feast of Tabernacles - Harvest Festival / Sukkot
This is a great feast observed after the harvest is completed

Under the clear skies of spring, people build booths or tabernacles and leaving their homes would dwell in them for a week (Lev 23:33-34)

This feast was a memorial of Israelites living in booths or tabernacles in the desert (Lev 23:42-43)

Last Jewish festival according to their calendar (Ex 23:14-17, Lev 23, Deu 16)

This feast falls on the week after the 15th day of the 7th month

It was to be observed when all the grain and wine are collected (Deu 16:13)

In the post exilic period, people celebrated this feast as a pilgrim festival (Ezra 3:1-2,4 - gathered in Jerusalem)

Digression 1 (not in textbook): Sukkot means thicket, hut

Digression 2 (not in textbook): Tabernacles is unique, in that the nations also were invited in ancient times to come up to Jerusalem at this season to worship the Lord alongside the Jewish people. This tradition first arose from the command given to Moses that Israel should sacrifice seventy bulls at Sukkot (Numbers 29:12-35), which were offered for the seventy nations descended from Noah (Genesis 10:1-32). When Solomon later dedicated his Temple at Sukkot, he also called on the Lord to hear the prayers of all the foreigners that would come there to pray (Read 2 Chronicles 6:32-33). Thus, Jerusalem and the Temple itself were destined from the start to be a “house of prayer for all nations” (Read Isaiah 56:7).

Read (Zech 14:9, 16-19)

The prophet Zechariah foretells of a time when all nations will ascend to Jerusalem from year to year to “worship the King, the Lord of hosts, and to keep the Feast of Tabernacles” (Read Zechariah 14:1-3,9,16). Future prophetic purpose hidden in this unique festival which will soon be revealed – and it has to do with the second coming of the Lord.

h2:Other Jewish Feasts
Other Jewish feasts that can be included in the list of canonical feasts are
&emsp; Sabbath - 7th day
&emsp; Sabbatical Year - 7th year

These are times of rest.

&emsp; The yield from the left-over crops in the 7th year shall be gleaned by orphans, the poor and the widows

h3:~m~Yobel Year - Year of Jubilee~m~

&emsp; The year of deliverance

h2:Day of Atonement - Yom Kippur
The Day of Atonement (Yom Kippur) also emerged as an important festival

Read Lev 23:27-29

ip: The 10th day of the 7th month

h2:Non-canonical feasts
These are the feasts which developed during the later stages

h3:1. Purim - Festival of Lots
‘Purim’ means lot. Also called the ‘Day of Mordechai’

Observed on the 14th day of Adar (12th month of Jewish Calendar) - 2 Macc 15:36

Commemoration of the deliverance of Jews from their enemy Haman through Queen Esther (Est 9:24-28)

h2:Apostolic Origin
~m~AD 52 - St. Thomas, The Apostle of Christ arrived in India, north of Cochin

~m~He preached to the Jewish colony and established Christian communities at seven places

~m~Maliankara (Kodungallore), Palayur, Paravur (Kottkavu), Gokamangalam (Kokamangalom), Niranam, Chayal (Nilackal) and Kollam

~m~There is also what is known as a “half-Church” at Thiruvithancode, which was a Church made on land donated by the local king~m~

In almost all these places, there is a strong presence of St. Thomas Christian communities with ancient traditions

St. Thomas then went to eastern parts of South India and was later martyred at Mylapore (near Chennai) in AD 72

h2:Historical Evidences
There is historical evidence of the representation of the churches in India at the First Ecumenical Council in Nicea. Records show that a Bishop named John attended the council and represented Persia and India

St. Ephrem attests the missionary work of St. Thomas in India, and has composed hymns on St. Thomas on the missionary work of St. Thomas, martyrdom and removal of bones to Edessa etc., in the 4th century

When the Portuguese reached India in 1498 AD, they found Christians were unanimous on the point that the Apostle St. Thomas suffered martyrdom and was buried at Mylapore

Many non-Christian residents near Mylapore also witnessed to the Portuguese that St. Thomas had been buried there and that Christian settlements existed in the vicinity

St. Eusebius of Caesaria also wrote about St. Thomas in India

h2:Persian Connection
Both Malankara and Persian Churches preserve and take pride in the apostolic tradition and heritage of St. Thomas

The heritage of St. Thomas has augmented the interrelationship and friendship of the two churches

Malankara Church maintained good relationship with the Persian church since the first centuries of Christendom

When the great persecution of the Christians took place, the Persian Christians migrated in small groups to Malankara

The 1st Persian immigration took place in AD 345 under the leadership of Cana - migration of fugitive

The 2nd immigration took place in AD 825 under the leadership of ‘Sabrisho’ - migration of merchants

The Persian immigration exerted a significant influence on the history of the Malankara Church - enriching the church life of Malankara church and in fulfilling its spiritual needs

h2:The Synod of Udayamperoor (Diamper) - 1599
Portuguese (Roman Catholics) came to Malankara for commerce in 1498 under the leadership of Vasco da Gama

They tried their best to convert Malankara Church to the Roman Catholic faith

Not in textbook: (In those days bishops from Persia were the Spiritual heads while an indigenous Priest called the Archdeacon was the leader of the community. The last Persian bishop Abraham died in 1597)

The Portuguese Archbishop of Goa, Alexis de Menesis, called the Synod of Diamper in 1599

Not in textbook: (Menezes threatened to depose Archdeacon George. Archdeacon gave in to the demands of Menezes. Instead of Angamaly, the headquarters of the diocese, a small place called Diamper (Udayamperur) near Kochi, the Portuguese stronghold, was chosen as the venue for the Synod. The synod solemnly began on the third Sunday after Pentecost, 20 June 1599, in the church of Diamper (Udayamperoor) and continued until 26 June 1599)

The synod, attended by 153 local priests and 660 laymen from the Church

Menezes presided over the synod. He controlled the proceedings of the Synod and took decisions

The Patriarch of Babylon, was condemned as a heretic

Historical writings testify that the decisions and decrees claimed to be taken at the Synod were obtained unilaterally through compulsion

Besides Menesis is said to have added certain decisions, which were not discussed in the Synod

The synod of Udayamperoor suppressed the identity and independence of the Malankara Church

h3:~m~The Decisions taken~m~
The perspectives of the Roman Catholic church regarding Trinity, Incarnation, Mother Mary, Original Sin, Purgatory, Intercession of Saints, Icon worship, Church and its organisation and Books of the Bible should be accepted

The Pope of Rome should be the only supreme head of the church. The Patriarch of Babylon should be rejected as he promotes heresy and schism

The list of saints of Malankara is not acceptable. Hence the list should be abandoned

Celibacy of Priests should be made compulsory

The Malankara church should be divided in Parishes and vicars should be appointed for each parish by the Bishop

h2:Coonan (Bent) Cross Oath (1653)
h4:~m~Coonan (Bent) Cross Oath (1653)~m~
The St. Thomas Christians who followed the Oriental faith and the liturgical system could not agree with the Roman faith

Not in textbook: (Archdeacon George of the Cross died 1634 and was succeeded by Archdeacon Thomas)

The elders of Nazranis sent several letters to various Oriental Churches seeking help from them in overcoming Roman Domination

As a result, an oriental bishop Ahathalla arrived in Malankara and this caused a new awakening in the people

The Roman Catholic authorities who came to know about the arrival of Ahathalla took him captive to Mylapore

Two deacons (Itty and Kurian) saw Ahathalla by chance in Mylapore and came to know about the purpose of his arrival

The St. Thomas Christians came to know about this, demanded the release of Ahathalla

But later news spread around that Ahathalla was killed by drowning at the Sea

The Christians of Kerala were stirred with anger and assembled at Mattanchery church on Jan 3, 1653 under Archdeacon Thomas

They tied ropes to a wayside granite cross there and took the pledge that they would never be under the Roman Catholic Church

Historians testify that out of the 200,000 St. Thomas Christians at that time, all except 400 participated in the freedom struggle

Because of the great crowd who tugged at the rope, the cross slanted to one side. Hence this came to be known as ‘Coonan (Bent) Cross Oath’

Roman Catholic historians call those who participated in the oath as ‘New Allegiant Group’ and those who participated as ‘Old Allegiant Group’; and this explanation is totally baseless

h2:The Marthoma Metropolitans
Four months after the Coonan Cross Oath, twelve priests of the church laid their hands on Archdeacon Thomas and ordained him a bishop under the title ‘Marthoma’

Thus Christians regained their faith and independence through the Coonan Cross Oath, which is the first independence movement in India against foreign domination

Not in textbook: (Later, Pope Alexander VII sent a Carmelite delegation under Joseph Sebastiani who succeeded in convincing the majority of Saint Thomas Christians that the consecration of the archdeacon as metropolitan was not legitimate. As the validity of Marthoma I’s consecration was questioned, he began to lose followers. Thus, by 1663, 84 of the 116 churches in existence were in favor of Sebastiani, leaving only 32 churches in favor of Marthoma I)

Marthoma I, meanwhile, sent requests to various Oriental Churches to receive canonical consecration as bishop. In 1665, Gregorios Abdal Jaleel, a bishop from Syriac Orthodox Church, arrived in India and regularized the Episcopal succession of Mar Thoma I

Thereafter, Malankara Church was governed by locally elected bishops who assumed the designation - Marthoma Metropolitans

Marthoma IX could not execute his authority in office. In 1815 Ittoop Ramban of Pulikottil became Metropolitan and took the name ‘Mar Dionysius’. Through a Royal Proclamation, he assumed the throne as ‘Metropolitan of Malankara’ which was equivalent in status and authority to ‘The Marthoma Metropolitans’

h2:Vattippanam or Fixed Deposit given for Interest
h4:~m~Vattippanam~m~
About 3000 Poovarahan (Golden or star pagodas) equivalent to Rs. 10,500 collected by Marthoma VI was deposited by Marthoma VII in the British East India Company at a rate of 8% interest per annum

The fixed deposit was known as Vattippanam

The annual interest acquired from this deposit was meant to be spent on social welfare projects of the church

h2:Founding of Orthodox Theological Seminary
The construction of Orthodox Theological Seminary was begun by Pulikkottil Itoop Ramban (later Dionysius II) in 1813

The then ruler of Travancore, Rani lakshmi Bhai, donated 16 acres of land tax free for the construction of the seminary

She also gifted Rs. 20,000 and the timber needed for the construction

Half of the fine imposed by Colonel Munroe on Hindu Brahmins for setting fire to Paliyekkara church Thiruvalla, was also granted for the construction of the seminary

The priesthood training center known as Old Seminary Kottayam started functioning in 1815, with the help of CMS missionaries and Colonel John Munroe

h2:Mavelikkara Padiyola (1836)
h4:~m~Mavelikkara Padiyola (1836)~m~
Malankara Church had a cordial relationship with CMS missionaries during the initial phase

But later these missionaries tried to impose reformist ideas in the liturgical tradition of the Malankara Church

As a consequence, the relationship strained

In 1835, Bishop Daniel Wilson, the Anglican bishop of Calcutta, came over to Malankara with his six-point suggestions

Mar Dionysius IV of Cheppad convened an assembly of Church representatives at Puthiyakavu church Mavelikkara on 16 jan 1836 to discuss and decide over these suggestions
====

The assembly decided to reject the suggestions of Bishop Wilson and remain steadfast in Syriac traditions they had been following

The inscriptions of the decisions taken at this assembly is known as ‘Mavelikkara Padiyola’

h2:Synod of Mulanthuruthy (1876)
h4:~m~Synod of Mulanthuruthy (1876)~m~
A few people under the leadership of Palakunnathu Abraham Malpan adopted a sympathetic attitude to reformist ideas

They encountered staunch opposition from the Malankara Church

In order to overcome this, he sent his nephew deacon Mathews to Antioch and got him consecrated bishop under the name ‘Mar Athanasius’

Mar Athansius returned to Malankara in 1843

He influenced the rulers of those days and asserted his position as Malankara Metropolitan

As a result, Cheppattu Mar Dionysius IV had to abdicate his throne

Malankara Church sent Fr. Joseph of Pulikkottil to Antioch

He got consecrated as Metropolitan in 1865

Mar Dionysius V returned to Malankara in 1866

Even though he tried to assert his position as Malankara Metropolitan, he could not succeed

In order to settle the dispute, Mar Dionysius and others decided to invite the Syrian Patriarch to Malankara

Patriarch Peter reached Malankara in 1876

He convened the ‘Synod of Mulanthuruthy’ at the Mulanthuruthy Marthoman Church

~m~The synod lasted 3 days~m~ and questioned the authority and governance of Mar Athanasius

Malankara church decided to adhere closely with West Syrian doctrinal, liturgical and church disciplinary norms

h2:Division of Malankara Church in Dioceses
Synod of Mulanthuruthy was an admission of the supremacy of the Patriarch

However, Mar Dionysius and his followers did not submit themselves to the Patriarch in their subsequent activities

The Patriarch realised the insubordination and without consent and knowledge of Mar Dionysius, divided Malankara Church into 7 dioceses and consecrated 6 new metropolitans to these dioceses

h2:Royal Court Verdict - 1889
h4:~m~Royal Court Verdict - 1889~m~
Even though the Synod of Mulanthuruthy rejected the appointment of Mar Athanasius as Malankara Metropolitan, the rulers of the state asked the church leaders to legitimise the decision through a court of law

Mar Dionysius filed a case in the district court in 1879 and it came to be known as the ‘Seminary Case’

A final verdict in this case came from the Travancore Royal Court in 1889

Through this Royal Court Verdict, Mar Dionysius affirmed his position as the Malankara Metropolitan

The verdict unequivocally declared that the Patriarch had only spiritual authority in Malankara

&emsp; The Catholicos

h2:Catholicos
The designation “Catholicos” was given to heads of churches outside the Roman empire

The word means ‘administrator’

The title of Catholicos was first used by the Metropolitan of Seleucia - Ctesiphon in the Persian Empire

The Persian councils held in AD 410, 420 and 424 determined the rights and authority of the Catholicos

The administrators who reigned over Malankara Church prior to the founding of the Catholicate in 1912 executed an equivalent administrative responsibility

The position of authority from ‘Vedathalavan’ to Catholicos gradually evolved through history

h2:Founding of the Catholicate
h4:~m~Founding of the Catholicate~m~
~m~The Catholicate was founded in Malankara on 15 Sep 1912~m~

~m~The immediate cause was the prohibition issued to the Malankara Metropolitan Vattasseril Thirumeni (Dionysius VI) by Mar Abdulla , Patriarch of Antioch

~m~When Patriarch Abdulla censured Dionysius VI, people of Malankara communicated with his predecessor Patriarch Abded Messiah and convinced him about the need to establish an independent Catholicate in Malankara~m~

Patriarch Abded Messiah had been politically ousted from authority because the Sultan of Turkey had withdrawn his consent for him

The Patriarch understood the crisis in Malankara and arrived here in 1912

He consecrated Paulose Mar Ivanios of Murimattathil as Baselius Paulose at Niranam Church

Thus the Catholicate, which is a symbol of an independent ecclesiastical administration, was realised for Malankara

When Mar Dionysius VI (Vattasseril Thirumeni) passed away in 1934, the posts of Malankara Metropolitan and the Catholicos were merged and vested with a single person - Mar Baselius Geevarghese II

h2:1934 Constitution
~m~In 1934, Malankara Church drafted and adopted its constitution~m~

Malankara Church could uphold its identity and independence through this constitution

It declared unequivocally that the Catholicos was the spiritual and the material head of the Malankara Church

Just as Catholicate and Maphrianite were founded in Persia in accordance with the specific circumstances prevailing there, the specific circumstances in Malankara too necessitated the founding of the Catholicate here

The Catholicate of Malankara exists today as a golden lamp in our church history

h3:The Arch Deacons (not in the textbook)
Details on the archidiaconate prior to the arrival of the Portuguese are elusive, but Patriarch Timothy I of the Church of the East (780–823) called the Archdeacon of India the “head of the faithful in India“, implying an elevated status by at least that time

In the recorded period of its history, the office of archdeacon was substantially different in India than in the rest of the Church of the East or other Christian churches.

In the broader Church of the East, each bishop was attended by an archdeacon, but in India, there was only ever one archdeacon, even when the province had multiple bishops serving it

Unfortunately the names and succession list of Archdeacons prior to the Portuguese period is lost to us

h1:Ch 8 - Observing the Passion Week
=============================================================
- Passion Week prayers are the most important in our church
- Lengthy supplication & meditation
- When we listen and understand the prayers, we can directly experience the suffering & crucifixion of Jesus Christ

h2: The Grouping
The prayers are clubbed together as three “hours” of worship
h4:Morning
&emsp; Night (12 AM) - Nocturn - Jesus taken captive (John 18:12)
&emsp; Morning (6 AM) - Matins (Prime) - The trial of Jesus (John 18:28)

h4:Noon
&emsp; 3rd hour (9 AM) - Terce - Pilate Sentences Jesus to be crucified (Mat 27:45)
&emsp; 6th hour (12 PM) - Sext - Crucifixion of Christ (Mat 27:45)
&emsp; 9th hour (3 PM) - Nones - Christ dies on the cross (Mat 27:46)

h4:Evening
&emsp; Evening (6 PM) - Vespers - Christ is taken from the cross (Mat 27:57)
&emsp; Soothara (means Protection) (9 PM) - Compline - Christ is entombed (Luke 23:54)

h2:Start of Passion Week
- Begins with Evening Prayers after Hosanna. ~m~As we know in the Orthodox tradition, a prayer day begins on the evening of the previous calendar day~m~
- Genesis 1:5 - God called the light “day,” and the darkness He called “night.” And there was evening, and there was morning—the first day.

h2:Annunciation to St. Mary
- If Mar 25 (Annunciation to St. Mary) falls during Passion week, normal prayers and Qurbana are done
- If Mar 25 is Good Friday, Good Friday services are done after Qurbana
- It’s a feast of our Lord (self-emptying of God)

h2:Special Kaumas
- The Trisagion prayer “Holy art thou O God” should be substituted with the Kauma for the specific day - And we should prostrate
- Instead of “Lord have mercy upon us”,we should sing the hymn “Lord Thy Praise” (Nadha the Sthuthiyum / Lokmor theshubuhatho)
- This is followed by Lord’s prayer
- ‘Hail Mary’ is not recited - since the focus is the passion and the cross of Christ

h2:Passion Week Prayers
The book of family prayers contains prayers that meditate on the passion of Lord Jesus Christ (after ‘Kauma’)

Public worship has prayers like Psalms, Promeyon (preface), Sedro (Order or series of prayers), ~m~Eniyono (means ‘Praise or prayer of response’: these are special meditative prayers said during the worship)~m~, Kolos (Hymns), Ethro (prayer with incense), Bothed Hasho (Pauses of Passion week prayers: these are hymns of meditation) and Bovootho (Prayers of Supplication)

- Promeon & Sedra for each canonical hour
- Evangelion is read for all canonical hours except Compline (Soothara)

~m~Promeyon~m~ - means ‘Preface’.
ip: Promeyon is the prefatory prayer said before the comparatively long ‘sedro’ prayer
ip: Exhortation from the priest before promeyon - “We all should pray and seek blessings and mercy from Lord Jesus Christ”
ip: Congregation replies - “O Lord Jesus Christ who blesses us! Help us by having mercy upon us” - Here we pray for God’s mercy and help
ip: Promeyons are composed according to the occasion - The significance of a particular day and a particular service are presented through them
ip: We are to praise & worship God at all hours everyday: Hence we pray “We submit all praise, honour and worship to you on all the days of feast; at all hours, times and throughout our lives”

We should prepare our body & mind, and stand in a disciplined manner for worship. The deacon reminds us the four features of the place where we stand
ip: Before Lord Jesus Christ who blesses us
ip: Before the Holy Altar which gives remission of sins
ip: Before the sacred & heavenly mysteries
ip: In presence of adorable priesthood

~m~Sedro~m~ - order or series (of prayers) composed by Mar Yuhanon I, Patriarch of Antioch
ip: Incense is offered during Sedro
ip: Salvific mission of God thru Jesus Christ is described
ip: Important incidents of the Old & New Testament Fathers are commemorated
ip: Holiness & mercy of God are glorified
ip: Supplications are submitted for both material & spiritual wellbeing
ip: Prayers for the upkeep, peace & welfare of the entire world are said. God’s mercy to fill up the entire universe
iq: for the cessation of wars,
iq: to remove famine and drought,
iq: for God’s will to prevail,
iq: assistance and support during hardship and distress,
iq: consolation prayers for the departed souls

ip: The prayer ends with the submission of praise & worship to the Trinity

The heavenly angels praise God with fear & devotion. We too join them in praising God

In the concluding part of Promeyon-Sedro Prayers, the priest blesses the laity saying: “May we acquire remission of debts and absolution of sins from God in this and the other world”

h2:Important Events in the Passion Week
‘Hail Mary’ not recited

~m~The chancel is veiled. Only unveiled during Holy Eucharist on Pesaha, Adoration of the Holy Cross on Good Friday and March 25, if it falls during passion week~m~

All other occasions, the offices are performed on the table of prayer (Azhikakam) with the Golgotha (wooden cross) erected at its front

Kukkilions are not recited. Instead Kauma is recited

~m~No benediction, Kiss of hand or Kiss of peace~m~

The proclamations before the Evangelion is brief & plain

The bell & Marvahso are not used during church services

Prostrate at specified occasions. Prostrate meditatively during Sedro

The altar is stripped of all altar vessels & covered in black on Good Friday

h2:Good Friday Prayers
On Good Friday, do night prayers at home. The service typically starts with Morning prayers

Reach early to participate in public worship at Church to meditate on the various stages of Christ’s passion and pray at the respective canonical hours

~m~On Good Friday, certain Hymns called ‘Sugeeso’ (additional) and Madroso are included. These hymns are added to regulate the length of service and add to the beauty of the service.~m~ They contain descriptions, instructions, praises etc. Most sugeesos are written in the form of conversation

h2:Good Friday Processions
h4:~m~Good Friday Processions~m~
Two Solemn processions

The first procession after the prayers of Terce (3rd hour)

Contrary to ordinary processions, the 1st procession departs thru southern side, encircles the church clockwise and re-enters thru northern side

Reminds us of Christ’s journey to Golgotha carrying the cross. The cross rests on the Priest’s right shoulder depicting a tired Christ carrying the cross

~m~The second procession is done within the church after the prostrations in front of the Holy cross

~m~It commemorates Joseph of Arimathea and Nicodemus carrying Christ’s body from the cross to the tomb

The procession is done twice in the clockwise direction & once in the anticlockwise direction

h2:Good Friday - Veneration of the cross
We bow to the Holy Cross that - has saved our souls - and say along with the thief - O Savior remember us when You come

h1:Ch 10 - Pesaha Eucharist
=============================================================
h2:Maundy Thursday
h4:~m~Maundy Thursday~m~
The prayers begin in such a manner that the Holy Eucharist completes at dawn

Holy Eucharist after the prayers of Night, Morning and 3rd hour

The chancel is unveiled and candle is lighted only when the priest enters the holy of the holies for thooyobo

Trisagion prayer “Holy art thou, O God…” is substituted by the Pesaha Kauma

This is followed by Nadha the Sthuthiyum / Lokmor theshubuhatho / Lord your praise

No kiss of peace. Deacon will not make the exhortation to ‘give peace to one another’. Instead, the deacon will make the exhortation for the first inclination by saying ‘Let us now bow our heads before the merciful Lord’

The priest will not give blessing of peace (“Peace be to you all”) to the congregation

When the priest opens out his hands and asks leave of the congregation (Shub’kono), he will not exchange hands of peace with other priests if they are present in the Holy of holies

When the chancel is veiled at the time of liturgy of Eucharistic Fraction either the hymn specified for the day or the “Pesaha Kauma” is recited

As Kukilyons are not recited, Pesaha Kauma followed by “Naadha the sthuthiyum” is recited and incense is offered

h2:Holy Saturday
h4:~m~Holy Saturday~m~
~m~Also known as ‘Saturday of preaching to the spirits’ & ‘Saturday of evangelism’~m~ (Read 1 Peter 3:18b-20. Read 1 Peter 4:6)

The names of the departed souls are given for remembrance in the Holy Qurbana because Jesus Christ, after His Death on the cross, descended to hades and preached to the spirits. So, we should commemorate our dear departed in the Holy Eucharist

Holy Eucharist is prohibited on the altar upon which the Holy cross is laid. Hence the Eucharist is celebrated on another altar

The chancel of the Holy of Holies where the Holy cross is interred is not unveiled

No one should stand or walk in the Holy of Holies carelessly

The Holy Eucharist begins by noon after completing the canonical prayers (9th hour) and after readings from the old testament

The order of Eucharist is same as Pesaha - no kiss of peace, no kissing the hand of the priest etc. The believers disperse after making their offering

Since it is the day of remembering all the faithful dead, we may pray at cemetery and priest may also cense the cemetery

h1:Ch 13 - The Epistles of St. Paul
=============================================================
St. Paul sent several letters to the churches he established.

The 14 epistles included in the New Testament are some of the important letters written by St. Paul

Through these, we are able to understand
ip: His personality & thinking
ip: His theological wisdom

How has God worked through St. Paul. When Paul wrote those letters, he had no idea that they would become some of the important books of the Holy Bible.

We don’t have all the letters. Some of the letters were lost. For example in 1 Corinthians, Paul speaks about a letter sent to them earlier.

These letters can be divided into two categories
ip: ~m~10 Epistles sent to churches~m~
ip: 4 Epistles sent to individuals

These epistles were written between AD 49 and AD 67.

These letters were
ip: Written in a specific context
ip: Give instructions to the church to which they were written
ip: To deal with the particular problems / conditions of those churches

~m~The epistles are Paul’s responses to the issues and needs of the churches. The circumstances of each church were different. They deal with matters of faith, internal divisions, heresies, faltering in morality etc.

~m~These letters were useful to us because
ip: ~m~These problems reappear in different forms even today. So, these epistles are valid for all times
ip: ~m~These epistles were written under the inspiration of the Holy Spirit.
ip: ~m~They contain important spiritual messages - for all people and at all times

Great scholar

Good hold on the Greek Language

~m~All his letters in Greek~m~

He was greatly influenced by his Jewish Background

Common in New Testament times to use an amanuensis (professional writer). He not only wrote what you dictated but often helped phrase what you wanted to say.

In the end, Paul writes his personal greetings

These epistles were taken by loyal people to their destinations

The same epistle is sometimes read in various churches (Colossians 4: 16)

Missing letter - Epistle to Laodiceans (Colossians 4: 16)

h2:The structure
h4:~m~The structure of Paul’s Letters~m~
Letters were in the model of letters written in ancient times. He makes necessary changes from the classical form. Let’s look at the structure
ip: Begin with a greeting / salutation. He expands the greetings meaningfully and gives them a Christian perspective
ip: The greeting is followed by thanksgiving to God for the Christian experiences of the recipients of the Gospel
ip: The body of the letter presents the teachings & dogmas of faith - depending on the problems faced by the church
ip: Conclude with words of blessing

h1:Ch 14 - The Theological vision of St. Paul
=============================================================
The theological vision of the apostle is visible in the epistles

They deal with all domains Christian faith and life

h2:Four stages in St. Paul’s thoughts
ip: End of the Age & The Second Coming of Christ
ip: Christology & thoughts on the Holy Spirit
ip: Vision of the Christian Church
ip: Church Administration, ecclesiastical authorities

h3:1. End of the Age & The Second Coming of Christ
In the first stage, the important themes are
ip:  End of the Age and the Second Coming of Christ
ip:  This theme is elaborated in 1st & 2nd Thessalonians
ip:  Christ is now seated in His great glory on the right-hand side of the Father
ip:  He has not revealed His kingdom and authority before the world. It will be revealed in His second coming
ip:  Then every knee would bow at the name of Jesus and every tongue should confess that Jesus Christ is Lord
ip:  The end of ages is described as the day of the Lord
ip:  On that day, Jesus would reappear for the last judgement of both the living & the dead
ip:  Before the second coming, Satan will strive against God with all his might. Christ will come only after this event
ip:  On His arrival, the dead would resurrect from their tombs and the living would be transformed
ip:  The day of the Lord would witness the last Judgement
ip:  After that all would join together in Christ
ip:  The life lost through sin shall be regained
ip:  The transformed will inherit the new sky and new earth

h3:2. Christology and thoughts on the Holy Spirit
Christ’s incarnation, death and resurrection as well as the experience of salvation
ip:  Jesus Christ is the eternal son of God
ip:  He is equal to & one with the Father
ip:  He is the manifestation of the Father
ip:  Everything in heaven and earth was created through the Son
ip:  Son willed to condescend / lower himself from his equality with the Father, took the form of servant & became man
ip:  Condescension is to become an offering for our salvation
ip:  Jesus is the Passover Lamb sacrificed for the remission of mankind
ip:  The sacrifice of Christ is the means for wiping off sins of mankind
ip:  This salvific act can be assimilated by mankind through Faith.
iq:  Faith is submitting oneself to the divine love and mercy revealed to us in Christ
ip:  The thoughts on Holy Spirit goes hand in hand with Christology
ip:  Life in Christ is described as Life in the Holy Spirit
ip:  The Holy spirit is a person of God
ip:  The Holy spirit resides in the church and apportions various graces for building up of the church; the greatest is love
ip:  The Holy spirit gives us strength & leads to fellowship & unity of the church

h3:3. Vision of the Christian Church
In the later period, when Paul is imprisoned in Rome, he thinks in detail about the Church and its Catholic nature. He thinks about the structure of the Roman empire and its administrative mechanism. This prompts him to think about the Christian church spread around the world and Jesus Christ who empowers and leads it. ~m~He uses three symbols to talk about the church.

ip:  ~m~Temple of God
ip:  ~m~Bride of Christ
ip:  ~m~Body of Christ

h4:The Church Symbol 1 - The Holy Temple of God
ip:  The believers are the stones that build up this temple

h1:Ch 15 - The General Epistles
=============================================================
h2:What are they
All epistles except those by Paul are called General epistles

They are not addressed to any church in particular - For ex, 1st epistle of St. Peter was written to the

believers scattered in Pontius, Galatia, Cappadocia, Asia and Bithynia

There are 7 general epistles - Peter (2), John (3), James (1), Jude (1)

Readings from the Northern side of the Chancel Step - (1) Acts of the Apostles / (2) General Epistles

Why? Gospel of Salvation of the Lord is proclaimed first to the Jewish community

~m~Pauline Epistles is read next at the Southern side indicating proclamation of the Lord’s Gospel of Salvation to the gentiles~m~

h2:Circumstances
~u~Written under 2 different circumstances~u~

Persecution of Christians - Christians underwent severe persecutions on account of their faith in Christ. Some were written to provide courage. Exhort them to remain steadfast in faith despite the persecution

The growth of heresies - Several heresies crept into the church through the influence of other religions and philosophies in those days. The epistles expound the fundamental principles of faith and exhort the believers to abide by these principles

h2:The First Epistle of Peter
Written at the time of persecution

Described as “Epistle of hope” & “Epistle of encouragement”

Imparts courage to the persecuted Christians & admonishes them to stand undaunted

It is believed that Emperor Nero (AD 54-68) is the tormentor referred to in this epistle

St. Paul & St. Peter became martyrs during this persecution

The first part of the epistle (1:3 - 4:11) deals with the spiritual & moral principles the believers have to follow

The second part (4:12 - 5:13) contains more references to the persecution. Since Christians are being persecuted, they are given specific instructions as to how to confront them

h2:The Second Epistle of Peter
Written in the background of heresies

This epistle shall be read along with the epistle of Jude. Both display similarities

About apostate teachers
ip:  They bring in damnable heresies
ip:  They even deny Lord Jesus Christ
ip:  They bring swift destruction upon themselves
ip:  They follow their pernicious ways
ip:  They utter feigned words out of covetousness

A variant of Gnosticism (heresy) crept into the church which became popular by the end of 1st century

h2:The Epistle of Jude
Written with the same background as 2nd epistle of Peter

The author describes himself as “Jude, the servant of Jesus Christ and brother of James”

Not Jude, the disciple of Christ. But Jude, brother of Jesus (St. Mark 6:3)

Jude was the brother of James, the Bishop of Jerusalem

Jude exposes the heresy of Gnosticism (matter is evil and that emancipation comes through gnosis)

h2:The First Epistle of St. John
Intimate thematic relationship between the first epistle of John and the Gospel of John

Written commonly to various churches in Asia Minor (in present day Turkey)

Doesn’t contain any references to individuals and persecution

The problem encountered by the church was apostate teachings & the confusions created by them. True faith was in Peril and needed to be defended

Heresy faced the church
ip:  Docetism - a variant of Gnosticism
ip:  Questioned the true human nature of Christ
ip:  Denied that Christ was Son of God
ip:  Challenged the fundamental faith regarding Jesus
ip:  Means of salvation was acquisition of knowledge

The apostle opposed this. The basis of salvation is the faith that redemption was brought by the death of Christ.

The apostle elaborates on love, the hallmark of Christian life

h2:The Second and third Epistle of St. John
h4:~m~The Second and third Epistle of St. John~m~
These are minor writings containing one chapter each

In the 2nd epistle, the apostate teachers are described as ‘deceivers who confess not that Jesus Christ is come in the flesh’
ip:  The heretics spread dangerous teachings. Hence believers should not keep any relationship with them

The third epistle is written to Gaius
ip:  The content of this epistle is the difference of opinion of Diotrephes, the head of a church with the Apostle

h2:The Epistle of James
~m~Not the Apostle of Christ. But a brother of Christ (Matt 13:55, Mark 6:3) ~m~

Bishop of Jerusalem, one of the three pillars of the church (Galatians 2:9)

Presided over the Council of Jerusalem (Acts 15:13-21)

~m~After resurrection, Jesus Christ appeared exclusively to James~m~ (1 Corinth 15:7)

~m~The theme of this epistle is outward religious service as the expression & proof of faith

~m~Too much insistence on faith in Christian teachings, as a result of misinterpreting the doctrines of St. Paul

~m~This epistle contains lots of instructions for practical Christian life

h2:Four ideas upheld by St. James
h3:~m~Four ideas upheld by St. James~m~
h4:1. Faith and work
Our faith should prompt us to do works of love

The true expression of faith in doing works

Faith without works is dead

h4:2. Christian equality & brotherly love
Exhortation for social Justice. Wealth is ephemeral

The rich are asked to take good care of their laborers

h4:3. Control the tongue
Controlling the tongue is essential for spiritual sustenance

Refrain from excessive and vain talk

h4:4. Prayer
Christian life shall be one of prayer and praise

Pray intensively during times of affliction

The elders of the church shall anoint the sick with oil in the name of the Lord

h1:Ch 16 - The Book of Revelation
=============================================================
The last book in the Holy Bible

Known as “The prophetic book of the New Testament”

~m~Written by Apostle John~m~

The book contains a vision by St. John while he was in exile on the Island of Patmos. So, it is called a “prophetic book”

The book of Revelation is perhaps the least popular book in the Holy Bible
ip:  Radically different from other books in its theme and presentation
ip:  Contains a lot of confusing visions and uncommon illustrations
ip:  The symbols and images used create confusion

Hence this book is not read during the public worship in the church

h2:Apocalyptic Books
h4:~m~Apocalyptic Books~m~
Apocalyptic books - ~m~Daniel (written in 2nd century B.C.)~m~ and Revelation

~m~Apocalypse (Greek) means unveiling, revelation ~m~

Apocalyptic writings - Revealing future happenings known only to God

Apocalyptic literature flourished during the time of persecution. People undergoing trials and persecution will have greater curiosity and anxiety about the future

h2:Prophetic books vs Apocalyptic Literature
h4:~m~Prophetic books vs Apocalyptic Literature~m~
Prophetic books are mainly teachings based on spiritual & moral issues of contemporary times. Apocalyptic writings present God’s judgment of the world in the future. They present the happenings at the end of the world

The prophets were primarily speakers. Their message was recorded only in later times. Apocalyptic writers are not speakers, but writers

The prophets often scolded the people & exhorted them to turn to God. Apocalyptic writers imparted courage to people & encouraged them to stand steadfast in faith

The prophets spoke about divine interventions in a clear language. Apocalyptic writers imparted their message covertly using symbols & images

h2:Features of Apocalyptic writings
Lack clarity of expression. Themes are presented in figurative & symbolic language. Images of strange creatures, animals & numerology are employed to convey the ideas

They depict the conflict between good & evil; i.e. between God and satan. People of God are persecuted because of Satan’s schemes. However, God eventually intervenes & defeats Satan and establishes His omnipotence

God reveals His message through dreams & visions. On most occasions the message is imparted through angelsRevelation of St. John

St. John reveals his name in Revelation. But does not reveal his name in his Gospel or in his epistles

The ideas, language and technique of expression in Revelation are radically different from his other works

Church fathers like Justin Martyr and Irenaeus who lived in the 2nd century have testified that this book was written by St. John himself. The tradition of subsequent times also upholds his authorship

The book of Revelation was written at a time when Christians were persecuted

The persecution was unleashed by Roman rulers because Christians declined the emperor’s decree to worship his idol. John was exiled to Patmos

The churches in Asia Minor were undergoing terrible persecution

Persecution was by Emperor Domitian of Rome (AD 81 to 96)

He propagated “worship of the Emperor” and demanded to be addressed “Lord & God”. The Christian could only address one person as Lord - Lord Jesus Christ, our saviour

It was under those circumstances that St. John had a vision of Heaven while living on Patmos Island to write the book of Revelation

h3:Central Message
Great message of hope & victory. Ultimately, it is not evil but good that wins. Satan and his hosts have domination for a period. Jesus Christ would vanquish them

The future is controlled by God. Evil & persecution happen to man as punishment & also for renewal of life. The future of mankind is in relation to Christ

The church has encountered trials and persecutions. Satan and opposing forces of the world and false teachings, create problems for the church. But Jesus Christ will attain victory over everything. A new Heaven and new earth will be born. The kingdom of God will be founded everywhere

h2:About the Hymn

Ephesians 5:19-20 - Speaking to yourselves in psalms and hymns and spiritual songs, singing and making melody in your heart to the Lord. Giving thanks always for all things to God the Father in the name of our Lord Jesus Christ

~m~St. Paul talks about 3 types of songs in Worship.~m~ This is a hymn

This hymn is greater than just a song. It declares the creed of the church

Mar Severios sings about the mystery of Incarnation of Jesus Christ

Proclamation of the creed of the church along with being a hymn to God

h2:Mar Severios of Antioch (AD 465 - 538)
5th Diptych: “We remember also our Patriarch St. Severus, the crown of the Syrians, the eloquent mouth, the pillar and the doctor of the Holy Church of God as a whole; the meadow abounding in​ blossom, who preached all the time that Mary was undoubtedly the God - bearer”

Born into an affluent family in the city of Sozopolis of Pisidia  in AD 465

Trained in language and oratory in Alexandria

Later, he went to Beirut and became well versed in Roman Law

During his stay in Beirut, he came to know about the Cappadocian fathers and became a Christian

Mar Severios took vows of Monasticism

Even though he was an expert in law, he preferred to stay in Jerusalem and lead the life of an ascetic

He donated his family wealth to the poor

He not only sang about the Incarnated Christ but also testified Christ through his life

After the council of Chalcedon, there arose a dispute regarding the unity of Christ’s Nature

Mar Severios expounded and defended the belief in One Nature of Christ and staunchly opposed the Two Nature theorists

His treatises, epistles and debates on this enlighten us in Christology

In AD 512, he was consecrated the Patriarch of Antioch

In his first speech on assuming the throne, he extolled the creed of the Great Councils of Nicaea, Constantinople & Ephesus; & rejected the heresies of the council of Chalcedon

In those days, non-Chalcedonians were cruelly persecuted

Mar Severios also suffered. He fled to Egypt and passed away in AD 538

He authored several great writings including this hymn

h3:Notes
In this solemn hymn, we commemorate the Mother of God, Saints, Christ’s Birth, Passion and Crucifixion

We also rely upon the Holy Trinity through this hymn

~m~In the Maniso of Mar Severios, only the events from the Birth till the Resurrection of Jesus Christ are mentioned

St. Paul states that, at the name of Jesus who was crucified and resurrected, “every knee should bow, of those in heaven and of those on earth and of those under the earth” (Philippians 2:10-11). God the Father would be glorified through Jesus Christ

~m~The public celebration of our Holy Eucharist begins with the commemoration of the salvific work of the Incarnated Lord Jesus Christ.

~m~Like angels, shepherds and wise men who bowed to Jesus when He was born in Jerusalem, we too bow before the Lord at the beginning of the Holy Eucharist

~m~This is ritually indicated through the priest encircling the altar and censing the altar and the people

~m~The people who make the sign of cross and bow to the censing confess the Gospel and their faith in Jesus Christ
