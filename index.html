h1:Ch 19 - The Ministration of Fraction, Consignation and Commixtion
==============================================================================
John 6:55,56 - For my flesh is true food and my blood is true drink. Those who eat my flesh and drink my blood abide in me, and I in them
===
h2:Introduction
The secret ministration performed in the veiled Holy of Holies during the Catholic Hymn “Hearken, gracious Lord we pray…” is known as the Ministration of Fraction, Consignation and Commixtion

~m~Jesus Christ who founded the Holy Eucharist took bread, blessed, broke and gave it to His disciples

~m~Our Holy Eucharist is divided into 4 parts based on these 4 acts of Jesus Christ

~b~Taking~b~: The act of taking indicates the preparatory ministrations and the lessons from the Holy Bible

~b~Blessing~b~: Blessing indicates the ministrations performed by the priest standing upon the altar step. This ministration ends with the ~m~Diptychs, which are a solemn part of our Eucharist ~m~

~b~Breaking~b~: What follows is the ministration of fraction, consignation and commixtion which is the act of breaking

~b~Giving~b~: The part of the Holy Eucharist from Lord’s prayer till the Holy Communion is the giving part

h2:The Second Benediction
~m~There are three Benedictions given during our Holy Eucharist

~m~After the second Benediction, the chancel is veiled and Catholic Hymn of ‘Hearken, gracious Lord, we pray…’ is sung

~m~While the 1st & 3rd benedictions are given in the name of the Holy Trinity, the 2nd benediction is given in the name of the Lord Jesus Christ

Benediction: “May the grace of Jesus Christ, the exalted God and our savior be upon you, my brethren, forever”

This is similar to the benedictions given by St. Paul in 1 Corinthians 16:23 and Galatians 6:18

h2:Catholic Hymn
h4:~m~Catholic Hymn~m~
The hymn recited after the veiling of the chancel is known as the catholic Hymn. This term means a general prayer

Certain special hymns are recited on this occasion on special days and feasts

However, we generally recite 2 hymns

h4:Hymn 1
Hearken, gracious Lord: This is a hymn to be recited meditatively.

It begs mercy from our Lord when the Holy Eucharist, which indicates the flesh of Jesus Christ is fractioned

It is the moment when we beg mercy from our Lord Jesus Christ who was crucified for our sake

h4:Hymn 2
Seraphim of fiery line: Composed in the background of the heavenly vision of prophet Isaiah (Read Isaiah 6:1-7).

It is a heavenly moment in which we realise that the chorus of angels are worshipping our Savior, Lord Jesus Christ

No one should go out of the church or engage in other activities on this occasion

~b~Isaiah 6:9-10:~b~- 9 He said, “Go, and tell this people, ’You hear indeed, but don’t understand. You see indeed, but don’t perceive.’ 10 Make the heart of this people fat. Make their ears heavy, and shut their eyes; lest they see with their eyes, hear with their ears, understand with their heart, and turn again, and be healed.“

~b~John 12:39-41:~b~- 39 For this cause they couldn’t believe, for Isaiah said again: 40 “He has blinded their eyes and he hardened their heart, lest they should see with their eyes, and perceive with their heart, and would turn, and I would heal them.“ 41 Isaiah said these things when he saw his glory, and spoke of him.

The vision in Isaiah 6 is a vision of the divine glory of God. By stating that Isaiah saw Jesus’ glory, John is testifying to the Deity of Jesus Christ, meaning Jesus shares the very same divine glory as the one Isaiah saw on the throne. Since “no one has ever seen God [the Father]“ (John 1:18), this vision of the visible manifestation of God’s glory is understood to be a manifestation of the pre-incarnate Son of God

h2:The Ministration of Fraction
h4:~m~The Ministration of Fraction ~m~
This ministration is called the ‘ministration of fraction’ because the priest breaks the Holy Bread kept in the Paten

Three events happen during this ministration
ip:  Fraction of the bread (The breaking of the Eucharistic bread)
ip:  Consignation of the Holy bread with the blood of Christ in the Chalice (sign of cross)
ip:  Commixtion (the act of mixing together) of the body and blood of Christ

The ministration of fraction is done secretly

The priest recites a prayer written by the Church father Dionysius Bar Salibi in the 12th century on this occasion

It is not just a prayer, but another declaration of the creed of the Church

The priest confesses the following through the recital of this prayer:
 1. Through the crucifixion of Jesus Christ, God the Word was broken and sacrificed for the sake of man’s salvation
 2. Jesus Christ did not lose God’s Essence from His body and soul due to death on the cross
 3. Jesus Christ died on the cross for the remission of sins of the entire creation.
 &emsp; Through crucifixion, we sinners (people inclined to the left) are transformed into a clean lot
 &emsp; (people inclined to the Right)

Through crucifixion, Jesus Christ reconciled Heaven and earth. Thereafter He resurrected on the third day. The offering of Christ on the Cross was a divine ministration for reconciliation between God and mankind, Jews and gentiles. This prayer secretly recited by the priest ends with the statement. ‘We believe in and confess what we have said. We affirm what we have said.’

h2:Litanies
Litanies are supplications recited by the deacon following the Catholic hymn

These prayers are composed in such a manner that we beseech for kindness from Lord Jesus Christ who became an offering on the cross for the entire the world

The crucifixion and resurrection of Jesus Christ has enabled our re-entry into paradise, which had been lost because of our sin

After commemorating these salvific events the chancel is unveiled and we prepare to recite the Lord’s prayer

As we read in Hebrews 10:19-22, we come to God the Father ‘by the blood of Jesus, By a new and living way which He consecrated for us, through the veil, that is, His flesh.’ With the freedom to cry out ‘Abba, father’ (Galatians 4:6-7)

Then we recite the prayer ‘Our Father in heaven…’ (Mat 6:9-13)

h1:Ch 20 - Priesthood in Christianity
==============================================================================
h2:Introduction
The ecclesiastical positions in our church: Deacon, Priest, Bishop, Catholicos / Patriarch
~m~The three major orders of priesthood~m~
&emsp;1. The Bishop (Metropolitans) ⇒ Bishop = Overseer
&emsp;2. The Priest (Kashisha) ⇒ Priest = Elder
&emsp;3. The Deacon ⇒ Deacon = Servant
The above 3 are positions in the hierarchy of Priesthood

The below 2 are specially designated administrative posts of ecclesiastical authority
&emsp; Catholicos / Patriarch

Two kinds of priesthood
ip:  General Priesthood
ip:  Special Priesthood

h2:Special Priesthood
To act as the representative of Jesus Christ, special commission from the Lord is necessary

The authority to celebrate the Holy Eucharist was given only to selected 12, who by Apostolic succession passed it onto the High Priests and Priests

In the early days of Christianity, the apostles went to preach the Gospel to all nations as instructed by our Lord during His ministry

In every town, they appointed men of faith as bishops and gave them these instructions
ip:Paul Speaks to the elders of the Church: Acts 20:28 Take heed to yourselves and to all the flock, in which the Holy Spirit made you overseers, to care for the Church of God which He obtained with the blood of His own Son

1 Peter 5:2 Tend the flock of God that is in your charge, not by constraint but willingly, not for shameful gain but eagerly, 3 not as domineering over those in your charge but being examples to the flock
The bishops ordained priests and deacons to serve and teach

This was done by laying hands upon them and praying to the Lord to grant them the authority and the gift of priesthood through the Holy Spirit

This Holy Order of men serve the Lord by their special vocation as the priest and shepherd

Priesthood is one of the seven Holy Sacraments of our church

h2:The Bishop
~m~‘Bishop’ comes from the Greek word ‘episcopos’ meaning overseer~m~

The bishop is the head of our church

He is our representative to God and is also the representative of Christ to us

As St. Ignatius said, “Where the bishop is present, there let the congregation gather just as where Jesus is, there is the Universal Church”

The bishop is chosen by the congregation and then presented to the other bishops who lay their hands on him and pray to God to grant him the gifts and authority of the Holy Spirit, saying
ip:“Grant him, O Lord, the spirit of wisdom and understanding, the spirit of power and consolation, the spirit of knowledge and piety. That in pure prayer, and illuminated heart in love, he may raise the offering for the ignorance and sins of the people, and bring them back to Thy Holy fold, that they may be one flock belonging to one shepherd”
The bishop is a shepherd of his diocese

He preaches, teaches, and administers all the sacraments

He cares for his people in every way and guards them against wrong ideas or doctrines.

This is mentioned during the prayer of ordination
ip:“Be an imitator of Christ, the true shepherd, who did lay down His life for His sheep. Be a leader of the blind, a light to those who are in darkness, a teacher of the young, a lamp to the world”
===
h2:The Priest
The word priest comes from the Greek word “presbyteros” meaning elder

The priest is ordained by the bishop to watch over his parish, as an honest steward watching over the mysteries of God (Read Titus 1:5)

He is a pastor & shepherd who loves & cares for his people

~m~He can administer all the sacraments of the church except the Sacrament of Holy Orders ~m~

St. Ignatius describes the priests as the council of the apostles. As the apostles were gathered around Jesus Christ and carried out His work, the priests are gathered around the bishop and help carry out his work

The duties of a priest are contained in the prayer for ordination, as follows:
===
ip:“Our Lord Jesus Christ has entrusted you with His life-giving sacraments. Know that you carry upon your hand, Emmanuel who was carried by Simon, the priest. Guard these sacraments as the Cherubim guard the Tree of Life”
ip:“O Lord, fill him with Thy Holy Spirit, that he may be worthy to stand before Thine Altar; to proclaim the Gospel of Thy Kingdom: to minister to the word of truth; to offer unto Thee spiritual gifts and sacrifices”
The priest should be called and chosen by God, just as Aaron was

The priest should follow the example of Christ
ip:John 10:11 “I am the good shepherd. The good shepherd lays down his life for the sheep”
He is ready to sacrifice his life unto death, to search for the lost sheep, to mend the broken homes, to strengthen the weak

In his struggle during his ministry, the priest offers himself as a sacrifice on the altar of witness (witness Christ)

h2:The Deacon
Deacon is the name used for all those who are ordained before the ordination of priesthood

The term deacon however usually refers to a full deacon

The other orders typically seen are reader and sub-deacon

St. Ignasius says that the deacons have the ministry of Jesus Christ who was the greatest servantHe gives himself completely to God and to his fellow beings

He gives himself completely to God and to his fellow beings

We are called to be God’s people and we do not have to become priests and nuns to serve him; for all are called to serve

We have seen that God has given different kinds of gifts and talents to the members of His Church

He has given these gifts to build up His Church and bring everyone to full life in Jesus Christ

Each one of us is given special gifts & talents to use in our daily life
ip:We have to perform our duties as a teacher, a bishop, a priest, a nun, or as a good Christian father or mother, brother or sister, or child of God
If we put our trust in God and pray, “Thy will be done”, we may discover our special gifts, and how God wants us to use our gifts
ip:God called Mordecai to work as a guard in the King’s palace. He was able by his faith and courage to serve God and overcome the evil acts that were planned against the King and against God’s people
ip:Esther, the orphan girl, became queen and was able to perform a great role in saving the people. She was ready to sacrifice herself and her throne for serving God
===
We can use our gifts as special services in the world. If we have talents as artists, musicians, doctors, teachers, merchants, or nurses we must try to develop and use them as best as we can to the glory of God

He has made us all members of His church and members of His royal priesthood

He has made us people of God, His laity. Everyone is first ordained through Chrismation to be a layman of God, one of God’s own people

As layman, we are called to offer our services of praise and glory to God forever

We are called to live in communion with God as brothers and sisters in Jesus Christ

We are called to use God’s gift of the Holy Spirit all through our lives

h1:Ch 21 - Holy Trinity
==============================================================================
h2:Introduction
~m~We believe in a Triune God - Three persons - Father, Son and the Holy Spirit. All these persons are completely God

~m~Triune God - One God and three persons at the same time

God is immeasurable and indefinable.

Man’s intellect is only a creation of God. A creation cannot fully comprehend the Creator

We cannot delimit God in numerals like one, three etc.

h2:Prayers and Sacraments
We confess our belief in the Holy Trinity in all our prayers and sacraments.

We begin with - “In the name of the Father, and of the Son and of the Holy Spirit, one true God.”

Shubaho… meaning “Glory be to the Father, Son and Holy Ghost” - This is also a praise to the Trinity

The prayers also end with a benediction in the name of the Holy Trinity

After the celebration of the Sosaffa during the Holy Eucharist, the priest gives the first benediction to the people in the name of the Holy Trinity: “May the love of God the Father, the grace of the Only Begotten Son and the communion of the Holy Spirit be with you all” - St. Paul also concludes 2nd Corinthians with this benediction

In the Holy Eucharist, the Holy Mysteries are elevated and celebrated with the pronouncement: “Holy mysteries, for the Holy and the undefiled.”. Following this, the declaration that “One Holy Father, One Holy Son and One living Holy Spirit” are ‘with us’ is made

This indicate - we are assembled in the presence of the Holy Trinity and we submit our prayers to the Holy Trinity

h2:Holy Trinity in the Old Testament
The Jews believed in one God. “O Israel, listen: Yahweh is our God, Yahweh is one” (Deu 6:4)

This verse was the creed of the Jews. However, we can find indications of the Holy Trinity throughout the Old Testament

1. Before the creation of Adam, the three persons of the Holy Trinity spoke among themselves
ip:Genesis 1:26 - And God said, Let us make man in our image, after our likeness
ip:Genesis 1:27 - So God created man in his own image, in the image of God created he him
In the first verse, plural form (us, our) and in the second verse singular form (his) is used to designate God. These verses indicate that God is three in form and One God simultaneously

2. In the Old Testament we find indications of the Word of God and the Holy Spirit
ip:Psalms 33:6 - By the word of the LORD (the Son) were the heavens made; and all the host of them by the breath of His mouth (the Holy Spirit)
The word used for breath in both Hebrew and Syriac is rooho (Spirit). Here the reference is to the Son and the Holy Spirit who partook with the Father in the act of creation
ip:Psalms 147:18 - He sends out his word (the Son), and melts them: he causes his wind (Spirit) to blow, and the waters flow.
====
3. Psalms 51:11 - Do not cast me away from your presence; and do not take your holy spirit from me

4. Isaiah 61:1 - The Spirit of the Lord GOD is upon me; because the LORD has anointed me to preach good tidings to the meek;
====
h2:Holy Trinity in the New Testament
====
The manifestations of the Holy Trinity in the Old Testaments were partial

But a complete revelation of the Holy trinity is manifested in the New Testament

Jesus Christ made revelations regarding the two persons of Father and the Holy Spirit

~m~The first manifestation of the Holy Trinity is at the baptism of Jesus Christ. When Christ was baptized in River Jordan, St. John witnessed that ‘the Heaven was opened. And the Holy Spirit descended in bodily form like a dove upon Him and a voice came from Heaven which said: “You are my beloved Son; in You I am well pleased”

~m~In Jordan River, the Son was in human form, the Holy Spirit in the form of a dove and the Father with His voice were present ~m~

The Lord’s Prayer is addressed to our Father who art in Heaven

Even though Christ addresses the first person of the Holy Trinity as ‘Father’, the Father’s manifestation in the New Testament is only through sound

God is beyond human thought and intellect and is invisible

~m~God the Father also revealed Himself and witnessed the Son during the transfiguration of Jesus on Mount Tabore, saying: “This is My beloved Son, in whom I am well pleased. Hear Him”~m~

The Holy Spirit too is invisible and beyond human intellect. ~m~The Holy Spirit manifested Himself in the form of dove at Jordan, in the form of tongues of fire on the Day of the Pentecost (Acts 2) and in the form of wind in the beginning of creation (Genesis 1:2)~m~

The New Testament writers including St. Paul also taught about the Holy Trinity according to the divine revelations received by them

h2:The Holy Trinity in our Church life
God is one in Essence but three persons

As we sing in the Maneesa of St. Severus
in:Thou wast † crucified for us, ​- Christ, who art our Lord and God; ​
in:Thou didst trample death by death, ​Ending this our death.​
in:Thou art One of Persons three, ​Holy Trinity, ​
in:Worshipped equal praised the same, ​
in:With the Father, and the Holy Ghost

A working definition of two terms is invaluable to our comprehension of the Trinity
ip: Essence (ousia or nature)
ip: Person (hypostasis)

h2:Three Persons in One Essence
h4:~m~Three Persons in One Essence~m~
God is one in Essence (ousia) yet three, Father, Son and Holy Spirit, in persons (hypostasis)

There is eternally in God true unity, combined with genuinely personal differentiation: the term ‘essence’, ‘substance’, ‘being’ or ‘nature’ indicates the unity, and the term person indicates the differentiation

Father, Son and the Holy Spirit are one in essence, not merely in the sense that all three are examples of the same group or general class (as with human beings), but in the sense that they form a single, unique, specific reality

h2:Communion
h4:~m~Communion~m~
The Triune God is a ‘community’. The believers who are joined with Christ through the sacrament of baptism and who live in Christ through the Holy Communion come near to this ‘community’. This is known as Communion. This word indicates our life with the Holy Trinity

The communion with the Holy Trinity is possible only through prayer

We join with Christ through baptism. And through the anointment of the Holy Chrism, the Holy Spirit dwells in us. Thus, we are transformed into children of the Heavenly Father

Each prayer strengthens our relationship with the Holy Trinity

And because you are sons, God has sent forth the Spirit of His Son into your hearts, crying out, “Abba, Father!”. “Therefore, you are no longer a slave but a son, and if a son, then an heir of God through Christ” Gal 4:6-7

Jesus Christ commanded His disciples to baptise all the nations in the name of the Father and of the Son and of the Holy Spirit (Mat 28:19)

The goal of Christ’s Incarnation was to bring mankind, that had drifted away from God the Father because of sin, back into Communion with God. The Holy Baptism and Holy Communion are means of fulfilling this goal

h1:Ch 22 - The Vision of End of Ages
==============================================================================
h2:Introduction
Rev 21:1 - Then I saw a new heaven and a new earth; for the first heaven and the first earth had passed away, and the sea was no more

~m~‘End of Ages’ (i.e. End of this world) will happen during the second coming of our Lord Jesus Christ ~m~

The Last judgement and eternal life are connected with this

In the Nicene creed, we confess our faith in
ip:The Triune God - Father, Son and Holy Spirit
ip:The Holy Church, One Baptism and Eternal life in the world to come
These are the fundamental dogmas of the Church

h2:New Testament - Vision of End of Ages
The importance of End of Ages
in: - The second coming of our Lord Jesus Christ

At the time of Ascension of Christ, two heavenly angels told the disciples
===
ip:Acts 1:11 - “This Jesus, who has been taken up from you into heaven, will so come in like manner as you saw him go into heaven”
===
The Holy Bible ends with the prayer: “Amen. Even so, come Lord Jesus” (Rev 22:20)

The First coming (Birth) of Jesus Christ became a turning point in history, even though many people did not recognise it.

History is divided into BC (Before Christ) and AD (Anno = In the year, Domini = of the Lord) based on the Birth of Jesus Christ. (Also, Read Acts 5:34 About Gamaliel)

The second coming of Christ will be the end of history and the beginning of eternal life

Mark 13:26 - “Then they will see the Son of Man coming in the clouds with great power and glory”. This means that the entire world will see the coming of Jesus Christ

~m~There are about 150 references to the Second Coming of Christ in the New Testament ~m~

~m~The Second Coming of Jesus Christ is often described using the Greek word “Parousia”, which means ‘arrival’ or ‘presence’. This word was used to describe the visit of the emperor or the high officials

~m~So, the second coming of Jesus will be in glory. The entry of Jesus into the Temple of Jerusalem on Palm Sunday is often considered as a sign of the coming of Jesus Christ ~m~

Words like ‘revelation’ and ‘manifestation’ are also used in the New Testament to describe the Second Coming of Jesus Christ
===
ip:During the 2nd coming of Christ, the meaning of life, the state of soul after death and the essence of eternal life will be revealed.
ip:So, these two words indicate that the 2nd coming would reveal things invisible and inscrutable to mankind
===
h2:The Vision of End of Ages & Church Life
When we say that Jesus Christ would come again, it does not mean that today we don’t have His presence in the Church and the world

in:Mat 18:20 “For where two or three are gathered together in My name, I am there in the midst of them”

Jesus Christ is present in all our worship. He is present in the Church as its head, its groom and its shepherd

Christ is present in the life of each believer who has received His sacraments of baptism and Holy Communion and who maintains a live relationship with Jesus Christ

Jesus Christ abides in us as our very life
ip:John 6:54 - Whoever eats my flesh and drinks my blood has eternal life and I will raise him up at the last day
ip:1 John 4:15 - Whoever confesses that Jesus is the Son of God, God abides in him, and he in God
ip:Gal 2:20 - I have been crucified with Christ, and it is no longer I who live, but Christ lives in me

We experience the totality of Christ’s presence and life only at His Second coming

The New Testament exhorts us to pray and live in the hope of His Second coming
ip:We pray ‘Thy kingdom come’ in the Lord’s Prayer with this hope in mind.
We confess our hope in the second coming of Jesus Christ in our Holy Eucharist as well
ip:“We commemorate thy death, O Lord, and confess Thy resurrection, and await Thy Second coming. May Thy blessings be upon us all”
Even though the second coming is a certainty, the New Testament doesn’t specify when that would happen.
ip:Mat 24:42 - “Watch therefore, for you do not know what hour your Lord is coming

Prayer is a sign of awakening. We say each of prayers in hope of the Second coming of Jesus Christ

~m~Jesus Christ has said that his Second coming would be from the east

~m~Mat 24:27 - “For as the lightning comes from the east and flashes to the west, so also will the coming of the Son of Man be”

~m~We say our prayers facing the east and bury our dead with their faces turned eastwards in hope of this second coming from the east~m~

The canonical prayers and the treatises of Church Fathers also contain the hope that Jesus Christ (the Sun of Righteousness - Mal 4:2) would arise in the East at the End of Age

~m~The Church Fathers describe the End of Age ‘as the dawn of Resurrection’, because the Second coming of Christ will be the dawn of a New Age~m~

h2:The End of Age & the Resurrection of the Dead
The most important event during the Second coming would be the Resurrection of the dead

The New Testament gives a detailed description of the Resurrection of the dead at Second Coming
ip:Thess 4:16-17 - For the Lord Himself will descend from heaven with a shout, with the voice of an archangel, and with the trumpet of God. And the dead in Christ will rise first. Then we who are alive and remain shall be caught up together with them in the clouds to meet the Lord in the air
The above passage is read during the Funeral Service of women

There will be the Last Judgement accompanying the resurrection of the dead
ip:John 5:29 - For the hour is coming in which all who are in the graves will hear His voice. And come forth - those who have done good to the resurrection of life and those who have done evil, to the resurrection of condemnation
===
ip:Eternal Life or the life in Heaven would be a life in fellowship with the large community of saintly people
===
ip:When we compare the kingdom of Heaven to a marriage feast, it indicates a life of fellowship (Read - Mat 8:11-12, 22:1-14)
===
At resurrection we will assume a body and a life different from that of today (Read - 1 Cor 15:35-57)

One feature of life in Heaven is incessant worship: “And there shall be no more curse, but the throne of God and of the Lamb shall be in it, and His servants shall serve Him” (Rev 22:3)
ip:The worship of the Church is a pre-sign of the eternal worship in Heaven. Rev 22:4 - “They shall see His face”
ip:What we get through the worship and sacraments of the Church is a foretaste of the eternal life in which we would see the face of God forever

h1:Ch 23 - H.H. Catholicos Baselius Geevarghese II
==============================================================================
h2:Introduction
Till 1876, we had only one metropolitan - known as ‘Metropolitan of Malankara’

He was the only Episcopal and administrative authority in those days

In 1876 six other metropolitans were consecrated

In 1912, the Supreme Head of the Malankara Church adopted the title ‘Catholicos’ and a new administrative system was formed

The modern age of Malankara church history began thereafter

Among these, the Catholicos who reigned for the longest is H.H. Baselius Geevarghese II

In 1947, he proclaimed Mar Gregorios of Parumala and Yeldo Mar Baselius of Kothamangalam as saints of the church

h2:Early Life
Ordained deacon in 1892 and a priest in 1898

On the very 3rd day of his ordination as priest, he took vows of a complete monastic life and was professed ramban

He resided with Parumala Thirumeni, served the saint and also learned the disciplines of monasticism

He visited the Holy land in 1908

On Sep 8, 1912, he was ordained a metropolitan - Geevarghese mar Gregorios

When Parumala Thirumeni passed away on Nov 2, 1912, he was appointed as manager of Parumala Seminary

h2:Catholicos
On Feb 15, 1928, he was chosen as the third Catholicos of Malankara. During this period, he was at the helm of the dioceses of Niranam and Kollam

He founded a Seminary at Kundara, Kollam and caused a great spiritual awakening in that region

When faced with the reformist teachings, the saintly life and authoritative teachings regarding true faith became instrumental in retaining several people in True faith

He published several books - ‘Secret Prayers’, ‘History of Martyrs of the Church’, ‘Penkisa Syrian Offices’, ‘Paradise’ etc.

h2:Malankara Metropolitan
Vattasseril Thirumeni passed away on Feb 23, 1934

The Malankara Christian Association which met on December 25 1934, entrusted the position of Malankara Metropolitan also with the Catholicos

~m~H.H. Geevarghese II became the first Catholicos to hold the twin offices of the Catholicos and the Malankara Metropolitan

~m~The position of Malankara Metropolitan traditionally has been the material authority of the church

~m~The position of the Catholicos founded in 1912 indicates the spiritual authority of the church ~m~ which includes consecration of Metropolitans, consecration of the Holy Chrism and Presiding over the Episcopal Synod

h2:Eternal Rest
Even though these two positions had been held by two different church fathers because of historical reasons, subsequent history proves that the same person holding both these positions has done good for the effective administration

He had been Metropolitan for 52 years, during which he was catholicos for 32 years and held the twin offices for 26 years

He is referred to as Father of Renaissance of Malankara Church


He entered into eternal rest on Jan 3, 1964 aged 90

First Catholicos to be interred at Catholicate Palace, Devalokam, Kottayam, which had been bought by the Church during his tenure

h2:A Great Ascetic
His spiritual rigors and ascetic practices were exemplary. He found in his teacher, St. Gregorios of Parumala, a model for asceticism

He was enthusiastic and vigilant about following prayers of Canonical Hours, Fasts, Fasting and Sacraments. He followed them intensively without a taint of laziness

He had illuminating spiritual experiences, which included hearing God’s answers in his solitary prayer and meditation

As a result, his word and vision became a rich spiritual experience for the believers

His life and observances helped even those who felt inclined towards Reformation, to appreciate the flavours of oriental spirituality

h2:His Powerful Christian Witness
He lived during a period in which Malankara Church was undergoing bitter factional squabbles

Even though several court cases were in progress, he relied on God’s grace in settling the disputes

Hence, he was undaunted when the verdict of 1951 went against him. He emboldened the believers with the optimistic statement “Truth will Triumph”

On the other hand, he extended his love and affection to all of them

When the Supreme Court verdict of 1958 became favourable, he did not feel excessively proud about it

Neither did he belittle or scoff at the opponents

He accepted them into the his fold with Christian love and reigned over the united Church as its High Priest till the end of his life

h2:His Social Recognition and Acceptance
The World Council of which met at Edinburgh in 1937 looked upon him as a great Oriental Father. He earned the earned the attention and recognition of all who attended the meeting

The ‘spiritual glow’ of his countenance attracted several people towards him

He visited the Patriarchs of Alexandria, Yugoslavia and Serbia

Dignitaries such as Ethiopian Emperor Haille Selassie visited the Malankara Church during his tenure

Leaders such as Jawaharlal Nehru showed great love and respect towards himHe elected H.H. Augen I as his successor and passed away in peace and hope aged 89 years on Jan 3, 1964

h1:Ch 24 - Fr. Dr. V.C. Samuel
==============================================================================
h2:Introduction
Fr. Dr. V.C. Samuel (1912-1998) was an Indian Christian philosopher, theologian, historian and ecumenical leader

Samuel Achen served as a university professor and a priest of the Indian Orthodox Church

He authored many books and papers including The council of Chalcedon Re-examined: Historical Theological Survey

h2:Studies
His life in Manjanikkara Dayara shaped his vision and perspective of life

After the mortal remains of Patriarch Elias III were interred there, a representative of the Patriarch always resided there

Ramban Abdul Ahad (Later Patriarch Yakub III) thus resided there and had a close association with him

Syrian Patriarchal delegate Elias Mar Yulios enabled Samuel to acquire deep knowledge in Syriac and Hebrew

He acquired mastery of English through his wide reading

Later he mastered several languages such as Greek, Latin, German, Kannada and Tamil

He did his BA in Philosophy, BD and STM (Master of Sacred Theology). He did his Ph.D from Yale University. He also got the fellowship of Rockefeller foundation for Post-Doctoral studies

h2:Works
He enquired into the background of the council of Chalcedon which caused the first split in the Christian Church and the truth behind One Nature, Two Nature theories

~m~His doctoral thesis published as ‘Council of Chalcedon - Re-examined’ ~m~proved that the differences originated because of the Socio-political conditions in those days as both factions did not understand each other

His self-critical book on Malankara Orthodox Church titled ‘is this an Indian Church?’ is the most important book authored by him. He argued that Indian churches should have a national character

He earnestly tried to bridge differences of faith between the churches. ~m~He presented treatises on Ecumenism at four assemblies of the World Council of Churches ~m~ - Evanstone (USA) 1954, New Delhi 1961, Uppsala (Sweden) 1968, Nairobi (Kenya) 1975

He served 23 years in Faith and Order, the theological fellowship of various churches including Roman Catholic Church. He presented papers in 7 assemblies. He gave active leadership to the dialogues between Roman Catholic and Orthodox churches as well as fellowship between Oriental Orthodox Churches and Roman Catholic Church

He also gave active leadership to KCC (Kerala Council of Churches) and NCC (National Council of Churches)

He has written several books and articles

~m~His book on Vattasseril thirumeni titled ‘Truth Triumphs’ was a book with a difference~m~

His autobiography titled ‘On the stage of Own Experiences’ is a sketch of a truthful life

~m~His book ‘Who is Jesus Christ?’ is a peerless work in Christology~m~

He also authored books included in the curriculum of ‘Divyabodhanam’ (Lay Spiritual Education) of Malankara Church

h1:Assignment 1. St. Geevarghese Mar Gregorios of Parumala

h2:Introduction
===============
                ~r~(15 June 1848 – 2 November 1902)

Mat 22:32 I am the God of Abraham, and the God of Isaac, and the God of Jacob? God is not the God of the dead, but of the living

Our worship - angels and departed take part. Everything worships God (Psalm 148)

Job 42:7 And it was so, that after the LORD had spoken these words to Job, the LORD said to Eliphaz the Temanite, My wrath is kindled against you, and against your two friends: for you have not spoken of me the thing that is right, as my servant Job has. 8 Therefore take now seven bulls and seven rams, and go to my servant Job, and offer up for yourselves a burnt offering; and my servant Job shall pray for you: for him will I accept: lest I deal with you according to your folly, in that you have not spoken of me the thing which is right, like my servant Job

We do not pray to saints. Prayer is always addressed to The Holy Trinity. We only invoke the saints to pray for us

ip:Popularly known as Parumala Thirumeni / Parumala Kochu Thirumeni
ip:Malankara Orthodox church had no canonization of saints historically
ip:On 2nd Mar 1945, H.H. Baselios Geevarghese II declared Geevarghese Mar Gregorios of Parumala as a saint. On November 2, 1947, Thirumeni was officially canonized as a saint along with Maphrian Yeldho Mar Baselios by the Holy Episcopal Synod
ip:His uncle Rev. Fr. Geevarghese Malpan of Chathuruthy family taught him Syriac Language
ip:14 Sep 1858 - Palakkunnathu Mathews Mar Athanasius ordained him as Korooyo

h3:The six ranks of the diaconate
==================================
                        ~r~ Not part of syllabus

1. 'Ulmoyo (Faithful)
2. Mawdyono (Confessor of faith)

h2:Cor-Episcopa
===============
ip:Palakkunnathu Mathews Mar Athanasius (25 April 1818 – 16 July 1877) was involved in teaching Protestant Theology
ip:Yuyakkim Mar Coorilos (1818-1874) came from Syria to Travancore, who was impressed by deacon’s scholarship in Syriac language, wisdom and devotion
ip:The deacon travelled with Mar Coorilos as his translator and guide
ip:Mar Coorilos ordained deacon Geevarghese as a full deacon. The deacon increased his knowledge in Syriac, Biblical knowledge and Theology
ip:Mar Coorilos was well pleased with the deacon and ordained him as a priest and Cor-Episcopa

h2:Monk
==================
ip:Fr. Geevarghese learnt about the Eastern Church from Mar Coorilos and was attracted towards them
ip:Malankara Metropolitan Pulikottil Mar Dionysius V (12 November 1833 – 11 July 1909) wanted church to have pious and noble monks to give a new life to church
ip:He heard about Very Rev. Geevarghese Kor Episcopa who led a monastic life at Vettikkal Dayara
ip:7 Apr 1872, Pulikkottil Thirumani elevated him to Ramban at the age of 24

h2:Metropolitan
================
ip:During the historic visit of Patriarch Peter IV in 1875, Geevarghese Ramban translated his sermons from Syriac to Malayalam beautifully
ip:Attracted by the pious, humble, devotional and learned Ramban, the Patriarch wanted to ordain him as a bishop
ip:Ramban wanted a full-time ascetic life and first refused to accept the offer
ip:However, he submitted to the will of God and was consecrated a bishop on 10th Dec 1876

h2:A typical day in the life of Thirumeni
=========================================
ip: ~b~4 AM:~b~ Thirumeni would wake up. The Seminary inmates also to get up by then
ip: ~b~Till 5 AM:~b~ Public prayer time
ip: ~b~5 AM - 7 AM:~b~ Thirumeni would teach deacons
ip: ~b~7 AM:~b~ Private prayers
ip: ~b~8:30 AM:~b~ If not a fasting day, breakfast served
ip: ~b~9 AM:~b~ Terce (3rd hour Prayer)
ip: ~b~Till 11 AM:~b~ Classes for deacons
ip: ~b~11 AM - 12 PM:~b~ administrative matters of the diocese
ip: ~b~12 PM:~b~ Lunch served.
ip: ~b~Till 1:30 PM:~b~ Rest
ip: ~b~1:30 PM - 4 PM:~b~ Classes for deacons
ip: ~b~4 PM - 5:30 PM:~b~ Diocese matters.
ip: Then evening prayer, bath & supper
ip: ~b~After Supper:~b~ He taught deacons Syriac Liturgical Prayers
ip: ~b~9 PM:~b~ Compline (Soothara Prayer)
ip: During night, thirumeni would get up several times for private prayers & devotions

Fasting and devotions were regular part of this routine

h2:Church Expansion
===================
ip:Malankara Orthodox Church, though ancient, remained as a small community in the South West India
ip:Boundaries expanded during Thirumeni’s time - thousands from Roman Catholic church and its leaders joined - attracted by Orthodox faith and worship
ip:Fr. Alwaris was chief among them. 29-Jul-1889 - Thirumeni consecrated him as bishop at Pazhaya (Old) Seminary and installed as the first Metropolitan of outside Kerala Diocese
ip:Today’s Brahmavar mission and diocese is the continuation of the work of saintly Alwarees Mar Yulios Metropolitan

h2:Jerusalem Pilgrimage
========================
ip:Thirumeni made the Jerusalem pilgrim at a time the journey was very difficult
ip:Thirumeni was not at all fascinated in sight seeing, all he wanted to have a deep Christ experience
ip:This journey resulted in writing a very good travelogue named Oorslem Yatra Vivaranam. This book was well received in the literary field of Kerala and once it was a text book in school. The literary style and language of this book was appreciated by all learned people

h2:The sermon preached at Parumala after Pilgrimage
====================================================
He expressed his deep spiritual experiences in the following words. “True worship is always in spirit and truth. Therefore Christian can worship God anywhere. However, while we acknowledge the sinful nature, we can grasp more spiritual things through seeing these sacred places where our Lord and saviour Jesus Christ lived, worked, died, buried and resurrected. Whenever we prayed at all these sacred places, we had some spiritual ecstasy which we never experienced anywhere. Certain times we felt that our mind became one with Lord and felt that not to get away from that place. I thought of lying there and pray unceasingly”
==================
h2:Missionary Zeal
==================
ip:On his return from Jerusalem, Thirumeni had tremendous change in vision and mission.
ip:People in this land commit sin due to illiteracy and poverty.
ip:There are socially untouchables who were discriminated.
ip:Christians have to work for their upliftment.
ip:We have to eradicate their poverty and hardships.
ip:They should be allowed to join in our church
ip:We have to preach Gospel among them
=========================
h2:Disciples of Thirumeni
=========================
Thirumeni was a great teacher. Among his disciples were
ip:Vattasseril Geevarghese Kathanar (later Malankara Metropolitan)
ip:Deacon Punnoose of Kurichy (later Catholicos His Holiness Baselios Geevarghese II)
ip:Deacon Paulose of Kuttikkattil family (later Metropolitan Paulose Mar Athanasius of Angamaly and entombed in Thrikkunnethu Seminary, Aluva).

h2:Life events
==============
ip:While he was a deacon, he contracted small pox. When he was very ill and extremely weak, he had a vision of St. Mary. She assured him that he would soon be well, and advised him to dedicate his life for God
ip:At Parumala Seminary, there were days when nothing was left for the next day. there were days when nothing was left for the next day. But thirumeni entrusted everything to God. One day nothing was left in the seminary for the next day’s expenses. Thirumeni said, the Word of God says that we need not worry about tomorrow. The next morning, a few people reached the seminary bringing a portion of the feast that was being conducted in their house
ip:When there was wide spread illness of small pox in Thumpamon, Thirumeni went and stayed there. Because of his prayers many were cured
ip:Leading upto the Golden Jubilee celebration of Pulikkottil Thirumeni’s Priestly Ordination, there was incessant rain. On the previous day, Parumala Thirumeni proclaimed that climate will be good. And it happened so.
========
h2:Death
========
ip:Thirumeni suffered from ulcer. It aggravated and took a bad turn due to the severity of his fasting and abstinence.
ip:Thirumeni’s illness took a turn for the worse in September 1902
ip:Thirumeni’s disciples Fr. Kochukoshy and Fr. Vattasseril Geevarghese looked after him
ip:Pulikkottil Thirumeni, when he came to know about Kochu Thirumeni’s illness reached the Seminary from Trivandrum
ip:Thirumeni called Vattasseril Geevarghese Kathanar to his side and entrusted to him the crosier and other insignia and the keys. After this Thirumeni lay still and silent for three days.
ip:On the third day, Thirumeni asked what date was it. He was told that the date was 18th (Malayama era), Thirumeni said: “O My Lord, I must suffer this pain for two more days.”
ip:On the morning of the 20th, Kantheela Sushroosha (the Sacrament of Anointing the Sick) was conducted for Thirumeni and he received the Holy Qurbana
ip:By about midnight on the 20th (2nd Nov 1902), Thirumeni was lying motionless, and in a feeble voice he said “My Lord!”. Punnoose Ramban (Later Catholicos Baselios Geevarghese II) and the priests who were standing around recited the Nicene Creed hrice. By this time the Holy Father breathed his last.
ip:Pulikkottil Thirumeni could not bear the sight of the motionless body of the saint. Paulose Mar Ivanios Metropolitan led the funeral service

h2:Thirumeni’s Sayings
ip:When we pray with a heart full of devotion, God accepts it and we receive blessings.
ip:Pray earnestly to God day and night. Such prayer is the best way to remove the darkness & fatigue in us; & also the means to attain salvation. Put your faith in God.
ip:You must regularly read the Holy Bible.
ip:God is on the side of the poor. Remember God in whatever you do; then everything will turn out for good.
ip:Whatever is due to the Church must be given forthwith. If your mind is pure in that matter, your house will also be pure. If in such thing you think of any gain or revenue, then you will lose that ten-fold.
ip:Be rich in the love of man and love of God. Brothers should never cheat each other. When you move away from unity you are sure to move away from God.
ip:Forgiveness is strength. It gives a person good name. It is the distinguishing feature of righteous people.
ip:Consult God in everything; consult your father too. If your father abandons you, God will also abandon you. Don’t be adamant in silly things, which will bring in dislike-of both God and men.
ip:Those who disobey their parents and join their enemies, are liable to be cursed by them. They will not inherit the legacy of their parents and will be disqualified in this world as well as the other.
ip:Never be proud. Pride is followed by fall. Humility is followed by greatness. Let God save you from every grave danger. Hold on to God in everything. He will bless you abundantly.
ip:Avoid arrogance, quarrel, and pride while dealing in Church matters; instead, let your humility shine before others. Those who place their trust in God, and satisfy the people are blessed.
ip:Remember God in everything. Let no one grieve because of you. Never let go an opportunity to do something good. Only those things will remain with you till the end.
ip:As far as possible never do evil to anyone; or it will ruin you, your children and your house. Hold on steadfastly to prayer, fasting and works of charity. Do them with faith and devotion.
ip:If you are lazy, your learning cannot progress. Hold fast to God.
ip:Death is at everybody’s door. Keep that in mind.
ip:If there is quarrel in the family, keep away from it. A quarrelsome house is the haven of the devil; and God is nowhere near it.
ip:It is not spiritual wisdom to try to conquer the enemy with evil than with virtue. If you depend on the God of Truth and go out with a truthful heart, God will accomplish things for you.
ip:Loss and difficulties come when God moves away. On such occasions, never look for one reason or the other. Instead, know that God has kept away because of your sins; then cling to God, he will show mercy upon you.

h2:1. A Pure Model of Eastern Spirituality
ip:There are certain special attributes to Orthodox spirituality.
ip:Chief among it is Theosis or Deification, “Son of God has become son of man in order to make sons of men into sons of God.”
ip:It was St. Athanasius of Alexandria who gave this axiom and this is the core of Eastern spirituality.
ip:Man Seek God not only for material comforts, but ultimate aim is to participate in the divine nature of God (2 Peter 1:4). “Yee seek first the Kingdom of God and its righteousness and everything will be added to it” (St. Matthew 6:33).
ip:This denotes an experience to be united with God.
ip:This is what Thirumeni stated about the blissful experience in Jerusalem about which we had seen early.


h2:2. Unseeing Prayer and Strict Ascetic Practices
ip:Sin separates man away from God.
ip:It is Satan who always tempts human to commit sin.
ip:In order to overcome satanic temptation we need the grace of God which we receive from prayer, lent and fasting.
ip:Thirumeni was not satisfied with mere ritual observations.
ip:Communion with God and purity of heart were his main objectives behind his ascetic practices.
ip:He taught “Those who pray daily will not become untruthful, unrighteous, unbelievable, unpious, unloving and ungodly. Prayer is joy for childhood, consolation for youth and happiness in old age”

h2:3. He Nurtured the Church
ip:Thirumeni lived at a time of the aggressive Western missionaries.
ip:People who always look for novelty were attracted by reformed faith and a few left the church also.
ip:To their arguments, Thirumeni gave reply not by words but by actions.
ip:He proved the credibility of Orthodox faith through his life.
ip:He believed that the Church is built by the people who are growing in purity of heart.
ip:His witness helped thousands of believers to be firm in Orthodox faith then and now

h2:4. Anthonios of Malankara
ip:St. Antony is the father of monasticism who lived in third century.
ip:Many monks lived in deserts and forests.
ip:Vettikkal and Parumala islands were deserted places before one and half century.
ip:These places were ideal to develop an ascetic mind in Thirumeni.
ip:He did not submit to any worldly pleasures.
ip:He did not even like to become a Metropolitan which he found a hindrance to his ascetic life.
ip:However following the path of some of the early Church fathers, for the sake of the Church he finally gave consent to the consecration.
ip:While we consider his strict monastic rules, undoubtedly he could be considered as the St. Antony of Malankara Orthodox Church

h2:5. Social Reformer
ip:Holy people will not go always in seclusion.
ip:After discerning the will of God, they try to reform the society in better ways.
ip:In the caste-ridden society, the backward people like Pulaya, Paraya and several other dalits faced hardships at that time due to social discrimination.
ip:Thirumeni had a compassionate affection towards them.
ip:He wrote, “The low caste people had no access to the public roads and they are deprived of human relationships. It is our duty to give them education, to eradicate their hardships and to deepen their faith in God so that they may also lead a better life.”
ip:He believed that God is always with the poor people and therefore those who love God should also love the poor people.

h2:6. Emphasis given to English Education
ip:He was not only a social reformer but also had radical ideas.
ip:Best example is his special concern for English education.
ip:Though Thirumeni opposed the Reformed faith of the Western missionaries, he felt the need of English education which English people brought here.
ip:He believed that English education will help the backward classes to come up to the main stream of the society.
ip:In that perspective he was very progressive minded.
ip:So he started English Schools in many places.
ip:In that venture neither profit motive nor communal interest was his intention.
ip:His only intention was to uplift the conditions of the poor who were systematically marginalized.

h2:7. Gospel to the non-Christians
ip:After Jerusalem pilgrimage, Thirumeni’s became more aware of the need to bring the Gospel to the non-Christians.
ip:He did radical things like converting other caste people to our church in Chengannur.
ip:The traditional Syrian Christians who considered themselves a higher caste did not like it.
ip:But Thirumeni did not favour the mentality of Syrian Christians.
ip:Numerical growth was not Thirumeni’s intention.
ip:He believed that if the lower caste people accept the faith of Christian Church, it will indirectly help them to improve their social status also in the caste-ridden society.
ip:Besides Christian faith will induce them to learn and imitate the higher values of the kingdom of God whereby they will change their life style accordingly.
ip:It was Parumala Thirumeni who took initiative to convert people to our Church which was later continued by late Pathros Mar Osthathios Thirumeni with strong vigour and commitment.
ip:Unfortunately this interest is slowly lost in our church and we need to go back to the paths cleared before us by these venerable fathers

h2:8. Parumala Church
ip:A thatched shed owned by Arikupuram family was being used, as a Chapel. This shed was near Azhippura, where Parumala Thirumeni stayed and conducted worship.
ip:Thirumeni decided to construct a church and a seminary at Parumala.
ip:The Arikupuram family agreed to give enough land to Parumala Thirumeni for this purpose.
ip:Thirumeni did not register the land in his name, but in the name of the Malankara Metropolitan.
ip:Money was collected from the people and Thirumeni constructed a beautiful church and seminary building using more than 20,000 rupees which he collected for this purpose.
ip:On the feast of St. Mary in 1895, Consecration of the church was conducted under the leadership of Joseph Mar Dionysius II of Pulikkottil, and the Holy Qurbana was celebrated.
ip:Thirumeni’s presence and worship in newly consecrated parish church attracted several people.
ip:Crowd grew day by day to worship there as well as to seek blessings from Thirumeni directly.
ip:The church is dedicated in the name of St. Peter and St. Paul. The church had two more altars one dedicated to St. Mary and the other to St. Thomas, the Apostle.
ip:It was by his unyielding faith and total dependence on God that Mar Gregorios could successfully accomplish these projects.
ip:Parumala Church was built by the will and pleasure of Parumala Thirumeni.
ip:Along with the church, he constructed this seminary building also.
ip:This old church had been renewed and the new one was consecrated on July 28, 2000. His Holiness Catholicos Baselius Mathews II gave leadership to the consecration.
ip:The old church building was later erected at the present Parumala Seminary hospital premise.

h1:Assignment 2. St. Gheevarghese Mar Dionysius of Vattasseril

h2:Introduction
===============
ip:Born on October 31, 1858
ip:Oct 12, 1876 - Ordained deacon by Patriarch Peter of Antioch
ip:Ordained full deacon on Oct 16, 1879
ip:Parumala Thirumeni ordained him as a priest on Jan 18, 1880 and appointed him Manager of Parumala Seminary
ip:Accompanied Parumala Thirumeni to Jerusalem in 1895
ip:Fr Gheevarghese was well-versed in Syriac language, theology, Canon Law, and teachings of the Fathers.
ip:Hence he was designated as ‘Malankara Malpan’, and was appointed as Malpan in the Orthodox Theological Seminary, Kottayam
ip:Ramban on Nov 2, 1903
ip:Pulikkottil Thirumeni chose him as his successor
ip:The Malankara Association elected him to the position of Metropolitan
ip:He went over to Jerusalem and was consecrated Metropolitan on May 31, 1908, by Patriarch Abdulla of Syrian Orthodox Church.
ip:Pulikkottil Joseph Mar Dionysius, the ruling Malankara Metropolitan, received him as his successor, bequeathed him all authority and moved to Kottayam Cheriyapally
ip:The Malankara Association accepted and acknowledged Vattasseril Mar Dionysius as the new Malankara Metropolitan

h2:1. The Prohibition of Vattasseril Thirumeni
==========================================================
h4:A historical background
ip:The relationship of Malankara Church with the Anglican Church began in the first half of the 19th century
ip:When the Protestant missionaries tried to influence the faith of the Church, Malankara Church severed its relationship with them
ip:A group of people who supported Protestant Reformation, sent a person (deacon Mathews) to Antioch to be consecrated Metropolitan.
ip:He was ordained as Mathews Mar Athanasius in 1842. This was the first instance of active contact with the Syrian Orthodox Church of Antioch
ip:Athanasius was approved by the governments of Travancore and Cochin as Malankara Metropolitan in 1852, after Cheppattu Philipose Dionysius abdicated due to ill health
ip:Pulikkottil Joseph Mar Dionysius II Metropolitan (Mar Dionysius V) was also sent to the Patriarch of Antioch in 1865 to be consecrated as a bishop
ip:This resulted in the establishment of some kind of Patriarchal authority over the Malankara Church
ip:The court cases with the Protestant Reformists came to an end with Royal Court Verdict of 1889
ip:Even though the Royal Court Verdict clearly stated that the Patriarch of Antioch had no temporal power over the Malankara Church, Patriarchs from time to time tried to impose their claim over the temporal possessions of the Malankara Church
ip:A  faction of the Malankara Church supported the Patriarch, which resulted in the two factions of the church - the supporters of the Patriarch (Bava kakshi) and the supporters of Malankara Metropolitan (Metran kakshi)
h4:The Prohibition Order
ip:Vattasseril Mar Dionysius also went to Jerusalem to be consecrated as Metropolitan
ip:Patriarch Abdulla asked him to submit a covenant of allegiance. Mar Dionysius refused
ip:The Patriarch did not give him Stathikon (Letter of Authority) placing Malankara Church under him
ip:The only Stathikon issued was that he was consecrated as a metropolitan and it did not indicate any authority vested with him
ip:The Patriarch also came to Malankara soon after
ip:The Clergy Trustee (Mathan Malpan) and Lay Trustee (C.J.Kurien) supported the Patriarch when he had differences in Opinion with Mar Dionysius
ip:Other Metropolitans who were consecrated by the Patriarch also signed the covenant of allegiance to him
ip:So, Mar Dionysius was left alone. However, he was not ready to surrender the Malankara Metropolitan’s authority over the material possessions of the Malankara church, granted via Royal court verdict.
ip:The patriarch became angry and sent a letter of “excommunication” to Vattasseril Thirumeni on 27 July 1911
ip:This prohibition was later observed by various court verdicts as denial of natural justice because not even an explanation was sought prior to this prohibition
ip:The prohibition was against the canonical laws of the church, moral laws and natural justice
ip:The rightful and Canonical Patriarch of Antioch, Abdel Messiah, the predecessor of Abdulla, who was still alive at that time, removed the prohibition of Vattasseril Thirumeni within a month, on 17 August 1911
ip:Even though the trustees forsook the metropolitan, the managing committee of the Malankara Church gave support to the Metropolitan
ip:Mar Dionysius suffered all this agonies for the sake of the church.
==========================================================

h2:The founding of the Catholicate
==========================================================
ip:The oriental churches require a prelate like the Catholicos to execute certain functions such as consecration of bishops and consecration of the Holy Chrism for Baptism
ip:Malankara church had depended on heads of foreign churches to execute these functions
ip:Ever since the reformists of the Malankara church approached the Patriarch of Antioch for the consecration of a bishop in 1842, we established a relationship with the church of Antioch
ip:The Patriarchs of Antioch were not satisfied with spiritual authority alone and wanted authority over the material wealth of the church
ip:Vattasseril Thirumeni did not submit to this demand and was excommunicated
ip:This led to the thinking that we should have a prelate of our own in order to solve the problems created by our dependency on foreign prelates
ip:Orthodox churches do not have a global head like the Pope of the Catholic church.
ip:Orthodox churches are independent in various countries and they have independent leadership
ip:Even though the predecessors of Vattasseril Thirumeni desired to create a similar administrative system in Malankara, they were not successful
ip:So, the prohibition issued on Mar Dionysius was the immediate cause of founding the Catholicate
ip:Patriarch Abdel Messiah had lost his position due to the political conditions in Turkey. His position as Patriarch was not defective as per the laws of the church. He had only lost his material power
ip:He gladly accepted the invitation of Malankara Church and arrived here in 1912
ip:At Niranom Church, on 12 Sep 1912, Patriarch Abdel Messiah consecrated Mar Ivanios of Murimattathil as the first Catholicos of Malankara
ip:The Catholicos was given the title Baselius. The first Catholicos was named Mar Baselius Paulose I
ip:The Catholicos was issued with a Sthathikon (Order of Authority) to consecrate bishops and consecrate the Holy Chrism
ip:The Malankara Church which had remained independent since the first century thus removed its dependencies which crept in during the course of history and gained a sovereign and independent Catholicate
ip:The founding of the catholicate was the greatest of the contributions by Vattasseril Thirumeni
in:The advantages gained by the church due to the founding of the catholicate are:
iq:- No dependency on anyone for consecrating bishops and Holy Chrism
iq:- Malankara church became independent
iq:- The Catholicate could reiterate the apostolic tradition of St. Thomas
iq:- The church earned the freedom to elect its Supreme Head
iq:- The church could retain its Indian culture
iq:- The church could foster ecumenical relationships in its status as an independent church
iq:- Malankara Church became a member of the World Christian Council of churches
ip:All these were realised as a result of the foresightedness and self-sacrificing work of Mar Dionysius of Vattasseril

==========================================================
h2:3. The Architect of Church Constitution
==========================================================
ip:Even though the independence of the church could be established through the founding of the Catholicate, Malankara Church lacked a constitution which could sustain the Catholicate.
ip:Even though the constitution of our church came into force after the demise of the Metropolitan, he was the chief architect of this constitution.
ip:The independence of the Church becomes meaningful only when the laity also has a role in Church administration.
ip:The Constitution upholds the autonomy and autocephaly of the Malankara Orthodox Church. It is Episcopal in its polity and not congregational. At the same time it upholds democratic principle by safeguarding the rights and privileges of the lay people.
ip:Today, the laity of the church enjoy the right to select the Supreme Head of the Church, the Metropolitans and the trustees of the Church.
ip:The administration of the church is carried out by the managing committee and the working committee which includes representatives of the laity.
ip:Each individual parish of the church enjoys the right to take decisions in all material aspects with the consent of the Metropolitan of the diocese
ip:The constitution enshrines the fundamental features of the Church, provides direction for its internal administration and preserves its integrity and autonomy.
ip:The Catholicos of the Malankara Orthodox Church who reigns on the throne of St. Thomas is an independent head (not under any foreign authority) and the rightful successor of St. Thomas.
ip:All this was possible because God used Mar Dionysius as His instrument.
==========================================================
h2:4. The Essence of Religious Instructions
==========================================================
ip:The Church has no existence without true worship and true faith.
ip:St. Paul teaches us in Ephesians 4:4-6 that there is only one faith and one baptism.
ip:The universal Church has clarified the one faith through the Nicene Creed. Prayers of all canonical hours and sacraments end with the recital of the Nicene Creed.
ip:A number of subjects like liturgy, sacraments, intercession required a clear perspective based on the Nicene Creed.
ip:Even though the dogmas of faith were inbuilt in the Liturgy, they were not documented separately to teach the laity, which was needed as the liturgical language (Syriac) and the spoken language of the church are different.
ip:Mar Dionysius removed this major drawback through a book authored by him - ‘The Essence of Religious Instructions’.
ip:Mar Dionysius who had been the Malpan at Orthodox Theological Seminary expounded what he taught his students in this book.
ip:The preface of this book clearly states that if we do not learn true faith first, we would turn towards the teachings of others and think that their teachings are true.
ip:This book was an effort to prevent such deviations in faith
ip:The book quotes Church Fathers while teaching the true faith of the church and mentions the names of the heretics and their heresies.
ip:Each topic is treated under the title ‘Essential Truth’.
ip:There are 34 ‘essential truths’ altogether and their biblical bases are expounded.
ip:This book gives clear definition and knowledge of the Holy Trinity and sacraments like Baptism, Holy Eucharist, Confession, Holy Chrism, Ordination, Marriage and Anointing of the sick.
ip:The book is unparalleled in its instruction regarding the fundamental faith of the church like observation of Sundays, the significance of Moronaya festivals, the need for prayer, Fasts and fasting, the intercession to Mother of God and saints and prayer for the departed.
ip:The very word ‘Orthodoxy’ stands for worshipping God in true faith. In that sense, Malankara Church was confirmed in Orthodoxy by St. Dionysius of Vattasseril.
ip:The teachings of Vattasseril Thirumeni regarding our faith is as important as the founding of the Catholicate.

h2:True Worship
==========================
ip:The study of faith is more or less an intellectual exercise.
ip:It is true worship that elevates knowledge at the cognitive level, to the level of experience.
ip:What we explain at the intellectual level is the God experience we receive through worship.
ip:There is no knowledge without worship and no worship without knowledge.
ip:So, the correct principle is that we worship in the language we know.
ip:We followed East Syrian Liturgy first. After establishing relationship with Antioch, we slowly shifted to West Syrian Liturgy. Neither were our spoken language.
ip:The most important feast as per Oriental Liturgy is Easter. Hence the prayer book of Kymtha or Resurrection season was first published.
ip:Prayers of seven canonical hours are very important for an Orthodox believer.
ip:These seven Canonical Hours are divided into two for the convenience of the believers.
ip:It was Gheevarghese Malpan (Vattasseril Thirumeni) who divided None (9th hr), Vespers (Evening) and Compline (Soothara) as Evening worship and Nocturn (Night), Matins (Morning), Terce (3rd hr) and Sext (6th hr) as morning Worship.
ip:The prayers of canonical hours stipulated for each day are available today.
ip:Similarly we have Holy Cross & Resurrection Season Prayer books and prayer books for Moronaya festivals and other feasts.
ip:Mar Dionysius of Vattasseril was one of the major forces behind the compilation of these prayer books.

h2:Quote from His Funeral
==========================
The words of His Holiness Catholicos Baselios Geevarghese II at the funeral service of St. Dionysius, at the Old Seminary Chapel:

“Mar Dionysius was a great and impeccable spiritual man. Several people did not know about this aspect of the Metropolitan. He did not have any pretensions of spirituality. I have lived with him ever since my childhood. I have not seen anything contrary to God’s will in his actions. He was a great Malpan. His demise was quite peaceful. His face did not display any expression of agony at the hour of death. The breath went out of him like the pendulum of a clock coming to a standstill. We had been chanting prayers and hymns near his deathbed. As we completed reciting the Nicene Creed at 12 P.M. on Friday, the very hour of crucifixion of our Lord Jesus Christ, for the salvation of mankind, his soul departed peacefully from the earth…We should identify the holy men of God, the saints, in this manner. Our Church has lost a great saint. He had hitherto been protecting us under his wings. Let us seek comfort in the thought that he would intercede for our sake, since he is sympathetic towards us. The prayers of the righteous have great strength”

var display_chapter = 1;

function formatStr(inString) {
    var outString = ''
    if (inString.substring(0, 2) == "- ") {
        outString = '&bull;' + inString.substring(1)
    }
    else {
        outString = inString
    };
    if (outString.includes("~a href") && outString.includes("~/a~")) {
        outString = outString.replace("~a href","<a href").replace("~",">").replace("~/a~","</a>")
    }
    while (outString.includes("~b~")) {
        outString = outString.replace("~b~","<b>")
        if (outString.includes("~b~")) {
            outString = outString.replace("~b~","</b>")
        } else {
            outString += "</b>"
        }
    }
    if (outString.includes("~b1~")) {
        outString = outString.replace("~b1~",'<span style="color: black; font-size: 24px; font-weight: bold;">')
        if (outString.includes("~b1~")) {
            outString = outString.replace("~b1~","</span>")
        } else {
            outString += "</span>"
        }
    }
    if (outString.includes("~b2~")) {
        outString = outString.replace("~b2~",'<span style="color: black; font-size: 16px; font-weight: bold;">')
        if (outString.includes("~b2~")) {
            outString = outString.replace("~b2~","</span>")
        } else {
            outString += "</span>"
        }
    }
    if (outString.includes("~r~")) {
        outString = outString.replace("~r~",'<span style="float: right;">')
        outString += "</span>"
    }
    while (outString.includes("~i~")) {
        outString = outString.replace("~i~","<i>")
        if (outString.includes("~i~")) {
            outString = outString.replace("~i~","</i>")
        } else {
            outString += "</i>"
        }
    }
    while (outString.includes("~u~")) {
        outString = outString.replace("~u~","<u>")
        if (outString.includes("~u~")) {
            outString = outString.replace("~u~","</u>")
        } else {
            outString += "</u>"
        }
    }
    while (outString.includes("~m~")) {
        outString = outString.replace("~m~","<mark>")
        if (outString.includes("~m~")) {
            outString = outString.replace("~m~","</mark>")
        } else {
            outString += "</mark>"
        }
    }
    return outString
};


/**
    * Converts basic Markdown (headers, lists, and paragraphs) to HTML using pure JavaScript.
    * This function manually handles nested lists based on simple indentation (4 spaces).
    */
function markdown_2_toc(markdown) {
    const lines = (markdown + "\n").split('\n');
    let toc = '<h1>' + document.title + '</h1>';
    toc += '<div class="container"><h2>Table of Contents</h2>'

    let h1_count = 0;
    let h2_count = 0;

    for (let line_i = 0; line_i < (lines.length - 1); line_i++) {
        const line = lines[line_i]; // The current line
        const hdr_chk = line.substring(0, 3);
        if (hdr_chk == "h1:") {
            h1_count += 1;
            hdr_name = line.substring(3);
            if (h1_count != 1) {toc += '<br>'};
            toc += '<span onclick="GoToChapter(' +  h1_count + ')" style="cursor: pointer; color: blue; text-decoration: none; font-size: 16px;">'
            toc += hdr_name + '</span><br>';
            h2_count = 0;
            continue;
        };
//        if (h1_count == display_chapter) {
            if (hdr_chk == "h2:") {
                h2_count += 1;
                toc += '&emsp; &emsp; <span style="font-size: 14px;">' + line.substring(3) + '</span><br>';
            };
//        };
    };
    toc += '</div>';
    return toc;
};

function markdown_2_page(markdown) {
    const lines = (markdown + "\n").split('\n');
    let html = '';
    let page_build = '';

    let h1_count = 0;

    var col_lines = "";
    let table_found = 0;

    for (let line_i = 0; line_i < (lines.length - 1); line_i++) {
        const line = lines[line_i]; // The current line
        if (table_found > 0) {
            if (line.includes(" ||")) {
                table_found = 2
            } else {
                page_build += '</table>'
                table_found = 0
            };
        };
        const hdr_chk = line.substring(0, 3);
        if (hdr_chk == "h1:") {
            h1_count += 1;
            hdr_name = line.substring(3);
            if (h1_count == display_chapter) {
                page_build += '<h1>' + line.substring(3) + '</h1>';
            };
            continue;
        };
        if (h1_count == display_chapter) {
            if (line.includes(" ||")) {
                if (table_found === 0) {
                    page_build = '<table style="border: none; border-collapse: collapse;">'
                    table_found = 1
                }
                else {
                    table_found = 2
                };
                col_lines = line.split(" ||");
                page_build += '<tr>'
                for (const each_col of col_lines){
                    page_build += '<td style="border: none">' + each_col + '</td>'
                };
                page_build += '</tr>'
                continue;
            };
            switch (hdr_chk) {
            case "===":
                break;
            case "h2:":
                page_build += '<h2>' + line.substring(3) + '</h2>';
                break;
            case "h3:":
                page_build += '<h3>' + formatStr(line.substring(3)) + '</h3>'
                break;
            case "h4:":
                page_build += '<h4>' + formatStr(line.substring(3)) + '</h4>'
                break;
            case "h5:":
                page_build += '<h5>' + formatStr(line.substring(3)) + '</h5>'
                break;
            case "hr:":
                page_build += '<hr style="height: 1px; background-color: grey; border: none; margin-top: 0px; margin-bottom: 0px;">'
                break;
            case "in:":
            case "ip:":
                page_build += '<p style="margin-left: 18px;";>' + formatStr(line.substring(3)) + '</p>'
                break;
            case "iq:":
                page_build += '<p style="margin-left: 36px;";>' + formatStr(line.substring(3)) + '</p>'
                break;
            case "pb:":
                break;
            default:
                if (line.trim() == '') {
                    page_build += '<div style="height: 5px;"></div>';
                }
                else if (table_found === 0) {
                    page_build += '<p>' + formatStr(line) + '</p>'
                }
                else {
                    page_build += formatStr(line + '<br>')
                };
            };
        };
    };

    page_build += '<span onclick="window.scrollTo(0, 0)" style="cursor: pointer; color: blue; text-decoration: underline; font-size: 14px;">[Back to Top]</span>';

    html += '<div class="container">' + page_build + '</div>';

    return html;
};

const markdownInput = document.getElementById('markdown-input');
const html_toc = document.getElementById('html-toc');
const html_page = document.getElementById('html-page');

/**
    * Main function to trigger conversion on input.
    */
function convertMarkdown() {
    const markdownText = markdownInput.value;
    try {
        var html_ret = markdown_2_toc(markdownText);
        html_toc.innerHTML = html_ret;
    } catch (error) {
        html_toc.innerHTML = `<p>Error in Native Conversion:</p><pre>${error.message}</pre>`;
        console.error("Native Markdown conversion failed:", error);
    };
    try {
        var html_ret = markdown_2_page(markdownText);
        html_page.innerHTML = html_ret;
    } catch (error) {
        html_page.innerHTML = `<p>Error in Native Conversion:</p><pre>${error.message}</pre>`;
        console.error("Native Markdown conversion failed:", error);
    };
}

function GoToChapter(inVal) {
    display_chapter = inVal;
    convertMarkdown()
    const verseElement = document.getElementById("html-page");

    if (verseElement) {
        const elementPosition = verseElement.getBoundingClientRect().top;
        const offsetPosition = elementPosition + window.pageYOffset;
        window.scrollTo({
            top: offsetPosition,
            behavior: "smooth" // Optional: makes it slide nicely
        });
    }
};


// Run the conversion once on load to populate the initial example text
window.onload = convertMarkdown;
document.getElementById("html-toc").style.display = 'block';
document.getElementById("html-page").style.display = 'block';
markdownInput.style.display = 'none'

</script>
